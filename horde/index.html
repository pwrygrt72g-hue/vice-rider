<script type="module">
import * as THREE from 'three';

/* ============================================================
   ZOMBIE BBQ — horde shooter FPS. VRAIE 3D (Three.js/WebGL) :
   caméra libre yaw+pitch, zombies volumétriques, balistique,
   explosions physiques. Zombies cartoon, décor apocalyptique.
   ============================================================ */

/* ---------------- réglages ---------------- */

  {id:'licorne', nom:'RAYON LICORNE',  dmg:34, rate:8,   pellets:1, spread:0,     range:70, auto:true,  prix:1200, ico:'🦄', pierce:true, legend:true},

/* ---------------- zombies : roster cartoon ---------------- */

  standard: {hp:26,  spd:2.0, dmg:8,  size:1.00, score:10, skin:0x7ec850, cloth:0x4a90d9, accent:0xff8ac2, acc:'bigoudis'},

  tank:     {hp:150, spd:1.1, dmg:18, size:1.55, score:40, skin:0x6db544, cloth:0xffd23e, accent:0xff9d2e, acc:'bouee'},
  boum:     {hp:18,  spd:2.9, dmg:26, size:0.95, score:20, skin:0xff6b5e, cloth:0xc9372c, accent:0xffd9d5, acc:'ballon', explode:3.0},
  sauteur:  {hp:20,  spd:3.1, dmg:9,  size:0.92, score:20, skin:0x9be86e, cloth:0x3ec6c0, accent:0xc8cdd6, acc:'ressorts', hop:true},
  invoc:    {hp:60,  spd:1.3, dmg:6,  size:1.10, score:60, skin:0x71c04d, cloth:0xf5f0e6, accent:0xd9b23d, acc:'cloche', summon:true},
};
const BOSSES = ['tank','invoc','boum'];

/* ---------------- état + persistance ---------------- */
const S = {
  scene:'menu', wave:0, score:0, coins:0, kills:0,
  px:0, pz:0, yaw:0, pitch:0, hp:T.pHp, hurtT:0, regenT:0,

  boosts:{}, usedContinue:false, muzzle:0, shake:0, t:0,
  bobT:0, bobK:0, hitMark:0, flash:0,
};
let zombies = [], pops = [], coins3d = [], projs = [], debris = [], tracers = [];
let meta; try{ meta = JSON.parse(localStorage.getItem('bbq-meta'))||{}; }catch(e){ meta = {}; }
meta = Object.assign({best:0, runs:0, maxWave:0, legend:false}, meta);
function saveMeta(){ localStorage.setItem('bbq-meta', JSON.stringify(meta)); }
function saveRun(){

    wave:S.wave, score:S.score, coins:S.coins, kills:S.kills, hp:S.hp,
    weapons:S.weapons, cur:S.cur, usedContinue:S.usedContinue }));
}
function clearRun(){ localStorage.removeItem('bbq-run'); }
function loadRun(){
  try{ return JSON.parse(localStorage.getItem('bbq-run')); }catch(e){ return null; }
}

/* ---------------- audio ---------------- */
let AC = null, master = null;
function initAudio(){
  if(AC){ AC.resume && AC.resume(); return; }
  AC = new (window.AudioContext||window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0.4; master.connect(AC.destination);
}
function tone(f, dur, type='square', vol=0.14, slide=0, delay=0){
  if(!AC) return;
  const t0 = AC.currentTime + delay;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(f, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(24, f+slide), t0+dur);
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g); g.connect(master);
  o.start(t0); o.stop(t0+dur+0.02);
}
function noise(dur, vol=0.3, lp=800){
  if(!AC) return;
  const b = AC.createBuffer(1, AC.sampleRate*dur|0, AC.sampleRate);
  const d = b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*(1-i/d.length);
  const s = AC.createBufferSource(); s.buffer = b;
  const f = AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value = lp;
  const g = AC.createGain(); g.gain.value = vol;
  s.connect(f); f.connect(g); g.connect(master); s.start();
}
function sfxGroan(){ tone(90+Math.random()*50, 0.5, 'sawtooth', 0.05, -30); tone(140, 0.3, 'sine', 0.04, 60, 0.12); }
function sfxPew(){ tone(660, 0.07, 'square', 0.08, -300); }
function sfxPompe(){ noise(0.16, 0.4, 1200); tone(120, 0.12, 'square', 0.1, -60); }
function sfxBoom(){ noise(0.5, 0.5, 500); tone(70, 0.4, 'sine', 0.2, -40); }
function sfxPouf(){ tone(320, 0.16, 'square', 0.09, -180); tone(160, 0.12, 'square', 0.06, -80, 0.06); }
function sfxCoin(){ tone(990, 0.07, 'square', 0.07); tone(1320, 0.12, 'square', 0.06, 0, 0.06); }
function sfxHurt(){ tone(200, 0.18, 'sawtooth', 0.14, -90); }
function sfxDing(){ tone(1700, 0.4, 'triangle', 0.12); tone(2200, 0.3, 'triangle', 0.07, 0, 0.05); }
function sfxFanfare(){ [523,659,784,1047].forEach((f,i)=>tone(f, 0.18, 'square', 0.09, 0, i*0.09)); }

/* ============================================================
   PUBLICITÉ — simulation (remplacer showAd() par le SDK réel).
   ============================================================ */
let adOpen = false;
function showAd(kind, onDone){
  adOpen = true;
  const scr = document.getElementById('screen-ad');
  const cd = document.getElementById('ad-cd');

  scr.style.display = 'flex';
  let left = 3;
  cd.textContent = left;
  const iv = setInterval(()=>{
    left--;
    cd.textContent = left > 0 ? left : '✓';
    if(left <= 0){
      clearInterval(iv);
      setTimeout(()=>{ scr.style.display = 'none'; adOpen = false; onDone && onDone(); }, 350);
    }
  }, 800);
}

/* ---------------- boosts ---------------- */
const BOOSTS = [
  {k:'x2',      nom:'FRAPPE ×2',   de:'double dégâts 30 s',   prix:100, dur:30, ico:'⚡'},
  {k:'gel',     nom:'GEL DE HORDE',de:'zombies à -50 % 15 s', prix:100, dur:15, ico:'🧊'},
  {k:'bouclier',nom:'BOUCLIER',    de:'invincible 12 s',      prix:120, dur:12, ico:'🛡'},
  {k:'aimant',  nom:'AIMANT',      de:'aspire les pièces 40 s',prix:80, dur:40, ico:'🧲'},
];
function giveBoost(k){
  const b = BOOSTS.find(b=>b.k===k);
  S.boosts[k] = b.dur;
  sfxFanfare();
}

/* ============================================================
   RENDU 3D
   ============================================================ */
const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('c3d'), antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.75));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x2a1c26, 38, 140);
const cam = new THREE.PerspectiveCamera(75, 1, 0.08, 400);
cam.rotation.order = 'YXZ';
scene.add(cam);

/* éclairage bicolore : LUNE bleue froide + horizon/feux orange chauds */
scene.add(new THREE.AmbientLight(0x8a8ca8, 1.5));
const hemi = new THREE.HemisphereLight(0x5a6aa8, 0x3d2e22, 1.25); scene.add(hemi);
const sun = new THREE.DirectionalLight(0xbfd2ff, 1.5);          // clair de lune
sun.position.set(-34, 42, 26);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -45; sun.shadow.camera.right = 45;
sun.shadow.camera.top = 45; sun.shadow.camera.bottom = -45;
sun.shadow.bias = -0.0005;
scene.add(sun);
/* flash de tir : une vraie lumière qui éclaire la scène */
const gunLight = new THREE.PointLight(0xffc36b, 0, 18, 2);
scene.add(gunLight);
const boomLight = new THREE.PointLight(0xff7a2e, 0, 40, 2);
scene.add(boomLight);

/* ---------------- ciel de braise ---------------- */
const sky = new THREE.Mesh(
  new THREE.SphereGeometry(300, 24, 16),
  new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite:false, fog:false,
    uniforms:{ uTime:{value:0} },
    vertexShader:`varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader:`
      varying vec3 vP; uniform float uTime;
      float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
      void main(){
        vec3 d = normalize(vP);
        float h = d.y;
        /* nuit bleu profond en haut, incendies orange à l'horizon */
        vec3 top = vec3(0.015,0.02,0.07), mid = vec3(0.10,0.07,0.16), low = vec3(1.0,0.34,0.08);
        vec3 c = mix(mid, top, smoothstep(0.12,0.65,h));
        c = mix(low, c, smoothstep(-0.01,0.16,h));
        /* lueur d'incendie pulsante côté est */
        float az = atan(d.x,-d.z);
        float fires = exp(-3.0*abs(az-0.9)) + 0.6*exp(-4.0*abs(az+2.1));
        c += vec3(1.0,0.32,0.06)*fires*smoothstep(0.25,0.0,h)*(0.85+0.15*sin(uTime*2.3));
        /* LUNE : disque net + halo froid */
        vec3 md = normalize(vec3(-0.55, 0.62, 0.45));
        float md2 = distance(d, md);
        c += vec3(0.55,0.65,0.85)*exp(-md2*md2*90.0)*0.8;         // halo
        float moon = smoothstep(0.055,0.048,md2);
        float crater = hash(floor((d.xy-md.xy)*160.0));
        c = mix(c, vec3(0.86,0.92,1.0)*(0.85+0.15*crater), moon);
        /* étoiles */
        if(h > 0.10){
          vec2 gv = floor(d.xz/max(0.12,d.y)*44.0);
          float st = step(0.993, hash(gv));
          c += vec3(0.8,0.85,1.0)*st*smoothstep(0.10,0.35,h)*(0.6+0.4*sin(uTime*3.0+hash(gv)*7.0));
        }
        /* nappes de fumée devant la lune */
        float sm = sin(d.x*5.0+uTime*0.04)*sin(d.y*8.0-uTime*0.025);
        c *= 1.0 - 0.14*smoothstep(0.15,0.6,h)*(0.5+0.5*sm);
        gl_FragColor = vec4(c,1.0);
      }`,
  }));
scene.add(sky);

/* ---------------- matériaux partagés ---------------- */
const MATS = {};
function mat(color, opts={}){
  const key = color + JSON.stringify(opts);
  if(!MATS[key]) MATS[key] = new THREE.MeshLambertMaterial(Object.assign({color}, opts));
  return MATS[key];
}
function box(w,h,d, color, opts){ const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat(color,opts)); m.castShadow = true; return m; }
function sph(r, color, opts, seg=12){ const m = new THREE.Mesh(new THREE.SphereGeometry(r,seg,Math.max(8,seg-2)), mat(color,opts)); m.castShadow = true; return m; }
function cyl(r1,r2,h, color, seg=8){ const m = new THREE.Mesh(new THREE.CylinderGeometry(r1,r2,h,seg), mat(color)); m.castShadow = true; return m; }

/* ---------------- sol : carrefour de banlieue dévastée ---------------- */
function streetTex(){
  /* texture unique 1024² couvrant 100×100 m centrés : rue en croix + trottoirs + terrains */
  const c = document.createElement('canvas'); c.width = c.height = 1024;
  const x = c.getContext('2d');
  const M = 1024/100;                       // px par mètre
  /* terre/herbe grillée */
  x.fillStyle = '#4d4434'; x.fillRect(0,0,1024,1024);
  for(let i=0;i<5200;i++){
    x.fillStyle = `rgba(${40+Math.random()*46|0},${36+Math.random()*40|0},${20+Math.random()*26|0},.5)`;
    x.fillRect(Math.random()*1024, Math.random()*1024, 3, 3);
  }
  for(let i=0;i<50;i++){                    // plaques d'herbe morte
    x.fillStyle = `rgba(70,${66+Math.random()*22|0},30,.35)`;
    x.beginPath();
    x.ellipse(Math.random()*1024, Math.random()*1024, 20+Math.random()*46, 14+Math.random()*30, Math.random()*3, 0, 7);
    x.fill();
  }
  /* trottoirs (bordures claires le long des rues) */
  const road = 10*M, side = 3*M;
  x.fillStyle = '#6d6862';
  x.fillRect(512-road/2-side, 0, road+side*2, 1024);
  x.fillRect(0, 512-road/2-side, 1024, road+side*2);
  /* dalles de trottoir */
  x.strokeStyle = 'rgba(30,28,26,.4)'; x.lineWidth = 2;
  for(let i=0;i<1024;i+=3*M){
    x.beginPath(); x.moveTo(512-road/2-side, i); x.lineTo(512+road/2+side, i); x.stroke();
    x.beginPath(); x.moveTo(i, 512-road/2-side); x.lineTo(i, 512+road/2+side); x.stroke();
  }
  /* chaussée */
  x.fillStyle = '#33302e';
  x.fillRect(512-road/2, 0, road, 1024);
  x.fillRect(0, 512-road/2, 1024, road);
  for(let i=0;i<2800;i++){
    const onV = Math.random()<0.5;
    const px = onV ? 512-road/2+Math.random()*road : Math.random()*1024;
    const py = onV ? Math.random()*1024 : 512-road/2+Math.random()*road;
    x.fillStyle = `rgba(${14+Math.random()*22|0},${13+Math.random()*20|0},${12+Math.random()*18|0},.6)`;
    x.fillRect(px, py, 3, 3);
  }
  /* lignes centrales pointillées */
  x.fillStyle = 'rgba(215,200,150,.75)';
  for(let i=0;i<1024;i+=44){
    if(Math.abs(i-512) < road/2+30) continue;   // pas au carrefour
    x.fillRect(510, i, 5, 22);
    x.fillRect(i, 510, 22, 5);
  }
  /* passages piétons */
  x.fillStyle = 'rgba(210,205,190,.7)';
  for(let k=0;k<5;k++){
    const off = 512-road/2+8 + k*(road-16)/4;
    for(const s2 of [-1,1]){
      x.fillRect(off, 512+s2*(road/2+6)-(s2<0?14:0), 6*M/6+6, 14);
      x.fillRect(512+s2*(road/2+6)-(s2<0?14:0), off, 14, 6*M/6+6);
    }
  }
  /* fissures + traces de pneus */
  x.strokeStyle = 'rgba(8,7,6,.5)'; x.lineWidth = 3;
  for(let i=0;i<10;i++){
    x.beginPath();
    let px = Math.random()*1024, py = Math.random()*1024;
    x.moveTo(px,py);
    for(let s2=0;s2<6;s2++){ px += (Math.random()-0.5)*120; py += (Math.random()-0.5)*120; x.lineTo(px,py); }
    x.stroke();
  }

function ruinTex(lit){
  const c = document.createElement('canvas'); c.width = 128; c.height = 256;
  const x = c.getContext('2d');
  x.fillStyle = '#241a20'; x.fillRect(0,0,128,256);
  for(let r=0;r<10;r++) for(let q=0;q<4;q++){
    const on = Math.random() < (lit?0.24:0.06);
    x.fillStyle = on ? (Math.random()<0.7 ? '#ff8a3d' : '#ffd23e') : '#171017';
    x.fillRect(10+q*30, 10+r*25, 16, 13);
  }
  return new THREE.CanvasTexture(c);
}

/* --- bâtiments de banlieue dans les 4 quadrants (les rues restent libres) --- */
function mkHouse(seed, burn){
  const g = new THREE.Group();
  const w = 7+rngS(seed)*4, h = 4.5+rngS(seed*3)*2.5, dep = 6+rngS(seed*7)*3;
  const base = new THREE.Mesh(new THREE.BoxGeometry(w,h,dep),
    new THREE.MeshLambertMaterial({map: ruinTex(burn), color: burn?0x6a5a52:[0xa89484,0x94a08a,0xa89a6e][Math.floor(rngS(seed*9)*3)]}));
  base.position.y = h/2; base.castShadow = true; base.receiveShadow = true;
  g.add(base);
  /* toit pyramidal qui déborde (parfois crevé/penché) */
  const roof = new THREE.Mesh(new THREE.ConeGeometry(1, 1, 4), mat(0x4a2e24));
  roof.scale.set(w*0.78, 1.6+rngS(seed*11), dep*0.78);
  roof.rotation.y = Math.PI/4;
  roof.position.y = h + (0.8+rngS(seed*11)*0.5);
  if(rngS(seed*13) < 0.45){ roof.rotation.z = (rngS(seed*17)-0.5)*0.5; roof.position.y -= 0.3; }
  roof.castShadow = true;
  g.add(roof);
  /* cheminée */
  const chim = box(0.5, 1.3, 0.5, 0x6a4438);
  chim.position.set(w*0.24, h+1.2, -dep*0.2);
  g.add(chim);
  if(burn){ SMOKERS.push({obj:g, ox:0, oy:h+1.4, oz:0, s:1.4}); }
  return g;
}
function mkShop(seed, burn){
  const g = new THREE.Group();
  const w = 9+rngS(seed)*4, h = 5.5+rngS(seed*3)*3, dep = 7;
  const base = new THREE.Mesh(new THREE.BoxGeometry(w,h,dep),
    new THREE.MeshLambertMaterial({map: ruinTex(true), color: burn?0x5d5250:0x8a8a96}));
  base.position.y = h/2; base.castShadow = true; base.receiveShadow = true;
  g.add(base);
  const lip = box(w+0.6, 0.5, dep+0.6, 0x55555f);   // acrotère
  lip.position.y = h+0.2; g.add(lip);
  /* auvent rayé au-dessus de la vitrine */
  const awn = box(w*0.8, 0.12, 1.6, rngS(seed*5)<0.5 ? 0xb04038 : 0x3878a8);
  awn.position.set(0, 2.6, dep/2+0.8);

  const sign = new THREE.Mesh(new THREE.BoxGeometry(w*0.55, 0.9, 0.2),
    new THREE.MeshLambertMaterial({color:0x222228, emissive:[0xff5d8a,0x57e8ff,0xffd23e][Math.floor(rngS(seed*7)*3)], emissiveIntensity:0.9}));
  sign.position.set(0, h-1.2, dep/2+0.18);

  const vit = box(w*0.7, 1.8, 0.1, 0x11141c);

  g.add(vit);
  return g;
}
function mkRuinPile(seed){
  const g = new THREE.Group();

  const wall = new THREE.Mesh(new THREE.BoxGeometry(6+rngS(seed)*3, 4+rngS(seed*3)*2, 0.6),
    new THREE.MeshLambertMaterial({map: ruinTex(false), color:0x8a7a70}));

  wall.castShadow = true;

    r.position.set((rngS(i*3+seed)-0.5)*5, 0.3+rngS(i*7)*0.6, 1.5+(rngS(i*9+seed)-0.5)*3);
    r.rotation.set(0, rngS(i*11)*7, (rngS(i*13)-0.5)*0.4);

}

function buildZombie(def, boss){
  const s = def.size * (boss?2.6:1);
  const g = new THREE.Group();
  const parts = {};
  /* peau clonée par zombie : permet le flash blanc à l'impact */
  const skinMat = new THREE.MeshLambertMaterial({color:def.skin});
  parts.skinMat = skinMat;
  const skinMesh = (geo)=>{ const m = new THREE.Mesh(geo, skinMat); m.castShadow = true; return m; };
  /* --- jambes : pivot à la hanche, pied au bout --- */
  const pantsCol = def.acc==='bandeau' ? 0xff7bd5 : 0x3c5c2a;   // short fluo du jogger
  for(const side of [-1,1]){
    const hip = new THREE.Group();
    hip.position.set(side*0.16*s, 0.74*s, 0);
    const leg = cyl(0.085*s, 0.115*s, 0.62*s, pantsCol, 7);
    leg.position.y = -0.31*s;
    hip.add(leg);
    const foot = box(0.17*s, 0.1*s, 0.32*s, def.acc==='bigoudis' ? 0xff8ac2 : 0x2c2c30);  // pantoufles roses !
    foot.position.set(0, -0.66*s, 0.09*s);
    hip.add(foot);
    if(def.acc==='ressorts'){
      for(let c2=0;c2<3;c2++){
        const coil = new THREE.Mesh(new THREE.TorusGeometry(0.11*s, 0.026*s, 5, 10).rotateX(Math.PI/2), mat(def.accent));
        coil.position.set(0, -0.74*s - c2*0.055*s, 0.05*s);
        hip.add(coil);
      }
    }
    g.add(hip);
    parts[side<0?'legL':'legR'] = hip;
  }
  /* --- torse : groupe incliné vers l'avant (démarche de zombie) --- */
  const torso = new THREE.Group();
  torso.position.y = 0.80*s;
  parts.torso = torso;
  const belly = def.acc==='bouee' ? 1.35 : def.acc==='ballon' ? 1.12 : 1;
  const bodyMat = def.acc==='ballon'
    ? new THREE.MeshLambertMaterial({color:def.cloth, emissive:0x400c08, emissiveIntensity:0.35})
    : mat(def.cloth);
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.36*s, 12, 10), bodyMat);
  body.scale.set(belly, 1.12, 0.88);
  body.position.y = 0.14*s;
  body.castShadow = true;
  torso.add(body);
  parts.bodyMat = bodyMat;
  /* ceinture/tablier selon le type */
  if(def.acc==='bigoudis'){
    const belt = new THREE.Mesh(new THREE.TorusGeometry(0.34*s, 0.05*s, 6, 14).rotateX(Math.PI/2), mat(0x8a5a9a));
    belt.position.y = 0.08*s; torso.add(belt);
  }
  if(def.acc==='cloche'){
    const apron = box(0.42*s, 0.5*s, 0.05*s, 0xf5f0e6);
    apron.position.set(0, 0.05*s, 0.32*s); torso.add(apron);
  }
  if(def.acc==='bouee'){
    const ring = new THREE.Mesh(new THREE.TorusGeometry(0.52*s, 0.16*s, 9, 18).rotateX(Math.PI/2), mat(def.accent));
    ring.position.y = 0.02*s; ring.castShadow = true; torso.add(ring);
    const duck = sph(0.15*s, 0xffd23e, {}, 9);
    duck.position.set(0.62*s, 0.14*s, 0.05*s); torso.add(duck);
    const beak = box(0.13*s, 0.05*s, 0.09*s, 0xff9d2e);
    beak.position.set(0.77*s, 0.13*s, 0.05*s); torso.add(beak);
    const eye = sph(0.03*s, 0x1c1c1c, {}, 6);
    eye.position.set(0.66*s, 0.2*s, 0.13*s); torso.add(eye);
  }
  /* --- bras : pivot à l'épaule, main au bout --- */
  for(const side of [-1,1]){
    const shoulder = new THREE.Group();
    shoulder.position.set(side*(0.34*belly+0.03)*s, 0.28*s, 0.05*s);
    const arm = skinMesh(new THREE.CylinderGeometry(0.055*s, 0.07*s, 0.52*s, 7));
    arm.position.y = -0.26*s;
    shoulder.add(arm);
    const hand = skinMesh(new THREE.SphereGeometry(0.095*s, 8, 7));
    hand.position.y = -0.54*s;
    shoulder.add(hand);
    shoulder.rotation.x = -1.35;             // bras tendus vers toi
    shoulder.rotation.z = side*0.12;
    torso.add(shoulder);
    parts[side<0?'armL':'armR'] = shoulder;
    if(side>0 && def.acc==='cloche'){        // le chef brandit sa cloche
      const bell = new THREE.Mesh(new THREE.SphereGeometry(0.16*s, 9, 7, 0, Math.PI*2, 0, Math.PI/1.8), mat(0xd9b23d, {emissive:0x5a4210, emissiveIntensity:0.4}));
      bell.position.y = -0.66*s;
      shoulder.add(bell);
    }
  }
  /* --- GROSSE tête expressive --- */
  const headG = new THREE.Group();
  headG.position.y = 0.86*s;                 // local au torse
  const headScale = def.acc==='bouee' ? 0.86 : 1;
  const head = skinMesh(new THREE.SphereGeometry(0.42*s*headScale, 16, 13));
  headG.add(head); parts.headM = head;
  const hs = s*headScale;
  /* yeux globuleux dépareillés + pupilles */
  const e1 = sph(0.14*hs, 0xf5f2ea, {}, 10); e1.position.set(-0.16*hs, 0.07*hs, 0.34*hs); headG.add(e1);
  const e2 = sph(0.10*hs, 0xf5f2ea, {}, 10); e2.position.set(0.17*hs, 0.02*hs, 0.36*hs); headG.add(e2);
  const p1 = sph(0.055*hs, 0x14140f, {}, 6); p1.position.set(-0.16*hs, 0.06*hs, 0.46*hs); headG.add(p1);
  const p2 = sph(0.04*hs, 0x14140f, {}, 6); p2.position.set(0.17*hs, 0.015*hs, 0.45*hs); headG.add(p2);
  /* sourcils fâchés (asymétriques = vivant) */
  const b1 = box(0.16*hs, 0.035*hs, 0.03*hs, 0x2c421e);
  b1.position.set(-0.16*hs, 0.22*hs, 0.38*hs); b1.rotation.z = -0.45; headG.add(b1);
  const b2 = box(0.13*hs, 0.035*hs, 0.03*hs, 0x2c421e);
  b2.position.set(0.17*hs, 0.17*hs, 0.38*hs); b2.rotation.z = 0.30; headG.add(b2);
  /* bouche ouverte + dents de travers */
  const mouth = box(0.2*hs, 0.1*hs, 0.03*hs, 0x321a14);
  mouth.position.set(0.01*hs, -0.19*hs, 0.38*hs); mouth.rotation.z = 0.14;
  headG.add(mouth);
  for(const [tx2,ty2] of [[-0.06,-0.155],[0.045,-0.15]]){
    const tooth = box(0.045*hs, 0.05*hs, 0.032*hs, 0xf5f2ea);
    tooth.position.set(tx2*hs, ty2*hs, 0.385*hs);
    headG.add(tooth);
  }
  /* oreilles décollées */
  for(const side of [-1,1]){
    const ear = skinMesh(new THREE.SphereGeometry(0.09*hs, 7, 6));
    ear.position.set(side*0.42*hs, 0.02*hs, 0);
    ear.scale.set(0.5, 1, 0.8);
    headG.add(ear);
  }
  /* accessoire signature */
  if(def.acc==='bigoudis'){
    for(const [bx2,bz2] of [[-0.2,0.12],[0,0.25],[0.2,0.12],[-0.1,-0.1],[0.12,-0.08]]){
      const bg = cyl(0.075*hs, 0.075*hs, 0.14*hs, def.accent, 7);
      bg.rotation.z = Math.PI/2;
      bg.position.set(bx2*hs, 0.4*hs, bz2*hs);
      headG.add(bg);
    }
  } else if(def.acc==='bandeau'){
    const bd = new THREE.Mesh(new THREE.TorusGeometry(0.4*hs, 0.07*hs, 6, 16).rotateX(Math.PI/2), mat(0xff7bd5));
    bd.position.y = 0.16*hs; headG.add(bd);
    const tuft = cyl(0.02*hs, 0.05*hs, 0.2*hs, 0x2c421e, 5);  // mèche folle
    tuft.position.set(0.1*hs, 0.44*hs, 0); tuft.rotation.z = -0.4;
    headG.add(tuft);
  } else if(def.acc==='cloche'){
    const toque1 = cyl(0.3*hs, 0.33*hs, 0.22*hs, 0xf5f0e6, 12);
    toque1.position.y = 0.44*hs; headG.add(toque1);
    const toque2 = cyl(0.34*hs, 0.3*hs, 0.3*hs, 0xf5f0e6, 12);
    toque2.position.y = 0.68*hs; headG.add(toque2);
  } else if(def.acc==='ballon'){
    const knot = cyl(0.035*hs, 0.06*hs, 0.12*hs, 0xffd9d5, 7);
    knot.position.set(0, 0.46*hs, 0);
    headG.add(knot);
    /* étincelle de mèche (visible quand la mèche est allumée) */
    const spark = new THREE.Sprite(new THREE.SpriteMaterial({map:flashTex, color:0xffd23e, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false}));
    spark.scale.setScalar(0.5*hs);
    spark.position.set(0, 0.62*hs, 0);
    spark.visible = false;
    headG.add(spark);
    parts.spark = spark;
  } else if(def.acc==='bouee'){
    const cap = sph(0.3*hs, 0x3878a8, {}, 10);   // bonnet de bain
    cap.scale.y = 0.55;
    cap.position.y = 0.3*hs;
    headG.add(cap);
  }
  torso.add(headG); parts.head = headG; parts.headY = 0.86*s;
  g.add(torso);
  /* barre de vie boss */
  if(boss){
    const hb = new THREE.Mesh(new THREE.PlaneGeometry(1.6*s, 0.12*s),
      new THREE.MeshBasicMaterial({color:0xff5d5d, side:THREE.DoubleSide, fog:false}));
    hb.position.y = 2.5*s;
    g.add(hb); parts.hpbar = hb;
  }
  return {g, parts};
}

/* ---------------- vagues ---------------- */
let spawnQueue = [], spawnT = 0;
function waveComp(w){
  const list = [];
  const n = T.waveBase + (w-1)*T.wavePer;
  for(let i=0;i<n;i++){
    const r = Math.random();
    let t = 'standard';
    if(w>=2 && r<0.22) t = 'sprint';
    if(w>=3 && r>=0.22 && r<0.34) t = 'tank';
    if(w>=4 && r>=0.34 && r<0.46) t = 'boum';
    if(w>=5 && r>=0.46 && r<0.56) t = 'sauteur';
    if(w>=6 && r>=0.56 && r<0.62) t = 'invoc';
    list.push(t);
  }
  if(w%5===0) list.push('BOSS:'+BOSSES[(w/5-1)%BOSSES.length]);
  return list;
}
function startWave(){
  spawnQueue = waveComp(S.wave);
  spawnT = 0;
  S.scene = 'play';
  hideAll();
}
function spawnZombie(tname, boss=false){
  const def = ZTYPES[tname];
  const a = S.yaw + Math.PI + (Math.random()-0.5)*3.4;
  const d = boss ? 22 : 15 + Math.random()*8;
  const k = boss ? 5.5 : 1;
  const {g, parts} = buildZombie(def, boss);
  const z = {
    type:tname, def, boss, g, parts,
    x:S.px+Math.sin(a)*d, z:S.pz+Math.cos(a)*d,
    hp:def.hp*k*(1+(S.wave-1)*0.08), hpMax:def.hp*k*(1+(S.wave-1)*0.08),
    spd:def.spd*(boss?0.75:1)*(1+S.wave*0.015),
    size:def.size*(boss?2.6:1),
    atkT:0, ph:Math.random()*7, groanT:2+Math.random()*6,
    sumT:3, hitT:0, hopT:0, chargeT: boss&&tname==='tank' ? 5 : 0, chargeDir:null,
    fuse:-1, kb:0, kbx:0, kbz:0, bs:1,
  };
  g.position.set(z.x, 0, z.z);
  scene.add(g);
  zombies.push(z);
  return z;
}
function spawnMini(x, z){
  const def = ZTYPES.standard;
  const {g, parts} = buildZombie(def, false);
  g.scale.setScalar(0.72);
  const m = {
    type:'standard', def, boss:false, g, parts,
    x, z, hp:14, hpMax:14, spd:def.spd*1.3, size:0.75,
    atkT:0, ph:Math.random()*7, groanT:3, sumT:0, hitT:0, hopT:0, fuse:-1, kb:0, kbx:0, kbz:0, bs:0.72,
  };
  g.position.set(x, 0, z);
  scene.add(g);
  zombies.push(m);
}

/* ---------------- run ---------------- */
function clearWorldEntities(){
  for(const z of zombies) scene.remove(z.g);
  for(const c of coins3d) scene.remove(c.m);
  for(const p of projs) scene.remove(p.m);
  for(const d of debris) scene.remove(d.m);
  for(const t of tracers) scene.remove(t.m);
  for(const p of pops) if(p.m) scene.remove(p.m);
  zombies = []; coins3d = []; projs = []; debris = []; tracers = []; pops = [];
}
function newRun(resume){
  clearWorldEntities();
  const rs = resume ? loadRun() : null;
  if(rs){
    Object.assign(S, {wave:rs.wave, score:rs.score, coins:rs.coins, kills:rs.kills,
      hp:Math.max(40, rs.hp), weapons:rs.weapons, cur:rs.cur, usedContinue:rs.usedContinue});
    S.wave--;
  } else {
    S.wave = 0; S.score = 0; S.coins = 0; S.kills = 0; S.hp = T.pHp;
    S.weapons = ['pistol']; S.cur = 'pistol'; S.usedContinue = false;
    meta.runs++; saveMeta();
  }
  S.px = 0; S.pz = 0; S.yaw = 0; S.pitch = 0; S.boosts = {}; S.regenT = 0;
  nextWave();
}
function nextWave(){
  S.wave++;
  if(S.wave > meta.maxWave){ meta.maxWave = S.wave; saveMeta(); }
  if(S.wave >= 10 && !meta.legend){ meta.legend = true; saveMeta(); }
  saveRun();
  if(S.wave === 1){ startWave(); return; }
  S.scene = 'shop';
  document.exitPointerLock && document.exitPointerLock();
  document.getElementById('wv-title').textContent =
    (S.wave%5===0 ? '⚠ BOSS — ' : '') + 'VAGUE ' + S.wave;
  document.getElementById('wv-score').textContent = `SCORE ${S.score} · 🪙 ${S.coins}`;
  renderShop();
  document.getElementById('screen-wave').style.display = 'flex';
  let left = T.transition;
  document.getElementById('wv-cd').textContent = left;
  clearInterval(nextWave._iv);
  nextWave._iv = setInterval(()=>{
    if(adOpen) return;
    left--;
    document.getElementById('wv-cd').textContent = Math.max(0,left);
    if(left<=0){ clearInterval(nextWave._iv); startWave(); }
  }, 1000);
}
function renderShop(){
  const box = document.getElementById('wave-shop');
  box.innerHTML = '';
  for(const w of WEAPONS){
    if(w.prix===0) continue;
    if(w.legend && !meta.legend) continue;
    const owned = S.weapons.includes(w.id);
    const el = document.createElement('div');
    el.className = 'card' + ((owned||S.coins<w.prix) && !owned ? ' off' : '');
    el.innerHTML = `<div class="cti">${w.ico} ${w.nom}</div>
      <div class="cde">${owned?'équiper':w.legend?'LÉGENDAIRE · perce tout':'dégâts '+w.dmg+(w.pellets>1?'×'+w.pellets:'')+(w.aoe?' · zone':'')}</div>
      <div class="cpr">${owned?'✓ possédée':'🪙 '+w.prix}</div>`;
    el.onclick = ()=>{
      if(owned){ S.cur = w.id; setWeapon(); renderShop(); return; }
      if(S.coins < w.prix) return;
      S.coins -= w.prix; S.weapons.push(w.id); S.cur = w.id; setWeapon();
      sfxCoin(); renderShop(); saveRun();
    };
    box.appendChild(el);
  }
  for(const b of BOOSTS){
    const el = document.createElement('div');
    el.className = 'card' + (S.coins<b.prix ? ' off' : '');
    el.innerHTML = `<div class="cti">${b.ico} ${b.nom}</div><div class="cde">${b.de}</div>
      <div class="cpr">🪙 ${b.prix}</div>`;
    el.onclick = ()=>{
      if(S.coins < b.prix) return;
      S.coins -= b.prix; giveBoost(b.k); renderShop(); saveRun();
    };
    box.appendChild(el);
  }
}
function gameOver(){
  S.scene = 'over';
  document.exitPointerLock && document.exitPointerLock();
  clearRun();
  if(S.score > meta.best){ meta.best = S.score; saveMeta(); }
  document.getElementById('ov-score').textContent = 'SCORE ' + S.score;
  document.getElementById('ov-detail').textContent =
    `vague ${S.wave} · ${S.kills} zombies · record ${meta.best}`;
  const adv = S.wave >= 4 && !S.usedContinue;
  /* AD SLOT: rewarded "continue" mis en avant quand la run est avancée */
  document.getElementById('btn-continue').style.display = adv ? '' : 'none';
  const show = ()=>{ document.getElementById('screen-over').style.display = 'flex'; };
  if(!adv && S.wave <= 3){
    /* AD SLOT: interstitiel après une mort précoce (frustration minimale) */
    showAd('interstitial', show);
  } else show();
}
function reviveRun(){
  S.usedContinue = true;
  S.hp = T.pHp; S.regenT = 0;
  giveBoost('bouclier');
  for(const z of zombies){
    const d = Math.hypot(z.x-S.px, z.z-S.pz);
    if(d < 12){ z.hp = 0; killZombie(z); }
  }
  purgeDead();
  document.getElementById('screen-over').style.display = 'none';
  S.scene = 'play';
}

/* tactile : joystick gauche = bouger, glisser à droite = viser */
let joy = null, look = null;
const touchLayer = document.getElementById('hud-touch');
touchLayer.addEventListener('touchstart', e=>{
  for(const t of e.changedTouches){
    if(t.clientX < innerWidth*0.45 && !joy) joy = {id:t.identifier, x0:t.clientX, y0:t.clientY, dx:0, dy:0};
    else if(!look) look = {id:t.identifier, lx:t.clientX, ly:t.clientY};
  }
  e.preventDefault();
}, {passive:false});
touchLayer.addEventListener('touchmove', e=>{
  for(const t of e.changedTouches){
    if(joy && t.identifier===joy.id){
      joy.dx = Math.max(-1, Math.min(1, (t.clientX-joy.x0)/55));
      joy.dy = Math.max(-1, Math.min(1, (t.clientY-joy.y0)/55));
    }
    if(look && t.identifier===look.id){
      S.yaw -= (t.clientX-look.lx)*0.005;
      S.pitch = Math.max(-1.35, Math.min(1.35, S.pitch - (t.clientY-look.ly)*0.005));
      look.lx = t.clientX; look.ly = t.clientY;
    }
  }
  e.preventDefault();
}, {passive:false});
touchLayer.addEventListener('touchend', e=>{
  for(const t of e.changedTouches){
    if(joy && t.identifier===joy.id) joy = null;
    if(look && t.identifier===look.id) look = null;
  }
}, {passive:false});
document.getElementById('btn-arme').addEventListener('click', e=>{
  e.target.blur();
  const own = S.weapons;
  S.cur = own[(own.indexOf(S.cur)+1)%own.length];

});

/* ---------------- viewmodel 3D : arme attachée à la caméra ---------------- */
const gunGrp = new THREE.Group();
cam.add(gunGrp);
let gunRecoil = 0;
/* matériau d'arme : auto-éclairé pour rester lisible dans la pénombre */
const GMATS = {};
function gmat(color){
  if(!GMATS[color]) GMATS[color] = new THREE.MeshLambertMaterial({color, emissive:color, emissiveIntensity:0.42, fog:false});
  return GMATS[color];
}
function gbox(w,h,d,color){ return new THREE.Mesh(new THREE.BoxGeometry(w,h,d), gmat(color)); }
function gcyl(r1,r2,h,color,seg=10){ return new THREE.Mesh(new THREE.CylinderGeometry(r1,r2,h,seg), gmat(color)); }
function gsph(r,color){ return new THREE.Mesh(new THREE.SphereGeometry(r,10,8), gmat(color)); }
function setWeapon(){
  while(gunGrp.children.length) gunGrp.remove(gunGrp.children[0]);
  const w = WEAPONS.find(w=>w.id===S.cur);
  const g = new THREE.Group();
  const colMap = {pistol:0x8a94a0, pompe:0xa05a2c, mitra:0x5a626e, grenade:0x6b8a64, licorne:0xf3c6ff};
  const col = colMap[w.id];
  const box = gbox, cyl = gcyl, sph = gsph;
  if(w.id==='pistol'){
    const bar = box(0.055, 0.06, 0.30, col); bar.position.z = -0.16; g.add(bar);
    const grip = box(0.05, 0.13, 0.06, 0x3a3f47); grip.position.set(0, -0.08, 0.02); grip.rotation.x = 0.25; g.add(grip);
  } else if(w.id==='pompe'){
    const bar = box(0.06, 0.07, 0.52, 0x2c2c30); bar.position.z = -0.26; g.add(bar);
    const wood = box(0.07, 0.09, 0.22, col); wood.position.set(0, -0.015, 0.06); g.add(wood);
    const pump = box(0.075, 0.06, 0.13, 0xc8cdd6); pump.position.set(0, -0.05, -0.24); g.add(pump);
  } else if(w.id==='mitra'){
    const bar = box(0.06, 0.08, 0.6, col); bar.position.z = -0.3; g.add(bar);
    const mag = box(0.05, 0.16, 0.08, 0x22262c); mag.position.set(0, -0.11, -0.1); g.add(mag);
    const tip = cyl(0.025, 0.025, 0.14, 0xffd23e, 8); tip.rotation.x = Math.PI/2; tip.position.z = -0.62; g.add(tip);
  } else if(w.id==='grenade'){
    const tube = cyl(0.075, 0.09, 0.4, col, 10); tube.rotation.x = Math.PI/2; tube.position.z = -0.2; g.add(tube);
    const mouth = cyl(0.1, 0.1, 0.06, 0x2a3a26, 10); mouth.rotation.x = Math.PI/2; mouth.position.z = -0.42; g.add(mouth);
  } else {
    const bar = box(0.06, 0.07, 0.5, 0xffffff); bar.position.z = -0.25; g.add(bar);
    for(let i=0;i<4;i++){
      const strip = box(0.065, 0.018, 0.5, [0xff6b9e,0xffd23e,0x7ce8a0,0x6bb8ff][i]);
      strip.position.set(0, 0.028-i*0.018, -0.25);
      g.add(strip);
    }
    const horn = cyl(0.001, 0.03, 0.14, 0xffffff, 6); horn.rotation.x = -Math.PI/2.4; horn.position.set(0, 0.07, -0.46); g.add(horn);
  }
  /* mains cartoon */
  const h1 = sph(0.045, 0xe8b489, {}, 8); h1.position.set(0.012, -0.05, -0.05); g.add(h1);
  const h2 = sph(0.04, 0xe8b489, {}, 8); h2.position.set(-0.015, -0.04, -0.24); g.add(h2);
  g.traverse(o => { if(o.isMesh){ o.castShadow = false; o.frustumCulled = false; } });
  g.scale.setScalar(1.3);
  gunGrp.add(g);
  gunGrp.position.set(0.24, -0.2, -0.45);
}

/* éclair de bouche : sprite additive au bout du canon */
const flashTex = (()=>{
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const x = c.getContext('2d');
  const gr = x.createRadialGradient(32,32,2,32,32,32);
  gr.addColorStop(0,'rgba(255,255,220,1)'); gr.addColorStop(0.35,'rgba(255,200,90,.9)'); gr.addColorStop(1,'rgba(255,140,40,0)');
  x.fillStyle = gr; x.fillRect(0,0,64,64);

const muzzleSprite = new THREE.Sprite(new THREE.SpriteMaterial({map:flashTex, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false}));
muzzleSprite.scale.setScalar(0.28);
muzzleSprite.position.set(0.24, -0.16, -1.0);
muzzleSprite.visible = false;

/* ---------------- tir ---------------- */
function curW(){ return WEAPONS.find(w=>w.id===S.cur); }
function dmgMul(){ return S.boosts.x2 > 0 ? 2 : 1; }
const _dir = new THREE.Vector3(), _o = new THREE.Vector3(), _tmp = new THREE.Vector3();
function viewDir(out, spread=0){
  out.set(spread?(Math.random()-0.5)*spread*2:0, spread?(Math.random()-0.5)*spread*2:0, -1).normalize();
  out.applyEuler(cam.rotation);
  return out;
}
function addTracer(from, to, color){
  const len = from.distanceTo(to);
  const m = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.02, len),
    new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.9, blending:THREE.AdditiveBlending, depthWrite:false}));
  m.position.copy(from).add(to).multiplyScalar(0.5);
  m.lookAt(to);
  scene.add(m);
  tracers.push({m, t:0});
}
function muzzlePos(out){
  out.set(0.24, -0.16, -1.05);
  return cam.localToWorld(out);
}
function fire(){
  const w = curW();
  S.fireT = 1/w.rate;
  S.muzzle = 0.07;
  gunRecoil = 1;
  gunLight.intensity = w.id==='pompe' ? 26 : 14;
  muzzleSprite.visible = true;
  muzzleSprite.material.rotation = Math.random()*7;
  if(w.id==='pompe') sfxPompe(); else if(w.id==='grenade') tone(240,0.2,'square',0.12,-120); else sfxPew();
  _o.setFromMatrixPosition(cam.matrixWorld);
  /* douille éjectée */
  if(w.id!=='licorne' && w.id!=='grenade'){
    const casing = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, 0.05, 6),
      mat(0xd9b23d, {emissive:0x5a4210, emissiveIntensity:0.4}));
    casing.position.copy(muzzlePos(_tmp)).add(_tmp.set(0,-0.05,0));
    scene.add(casing);
    const right = _tmp.set(1,0,0).applyEuler(cam.rotation);
    debris.push({m:casing, vx:right.x*2.4+Math.random(), vz:right.z*2.4+Math.random(),
      vy:2.2+Math.random(), t:0});
  }
  if(w.proj){
    const m = sph(0.09, 0x2a3a26, {}, 8);
    viewDir(_dir);
    m.position.copy(_o).addScaledVector(_dir, 0.6);
    scene.add(m);
    projs.push({m, vx:_dir.x*22, vy:_dir.y*22+2.0, vz:_dir.z*22, w});
    return;
  }
  const muzz = muzzlePos(_tmp.clone());
  for(let p=0;p<w.pellets;p++){
    viewDir(_dir, w.spread);
    /* rayon → sphère de chaque zombie */
    let hits = [];
    for(const z of zombies){
      if(z.hp<=0) continue;
      const cx = z.x-_o.x, cy = 1.1*z.size-_o.y, cz = z.z-_o.z;
      const t = cx*_dir.x + cy*_dir.y + cz*_dir.z;
      if(t < 0 || t > w.range) continue;
      const dx = cx-t*_dir.x, dy = cy-t*_dir.y, dz = cz-t*_dir.z;
      if(dx*dx+dy*dy+dz*dz < (0.72*z.size)**2) hits.push({z, t});
    }
    hits.sort((a,b)=>a.t-b.t);
    if(!w.pierce) hits = hits.slice(0,1);
    const endT = hits.length ? hits[hits.length-1].t : Math.min(w.range, 40);
    addTracer(muzz, _tmp.copy(_o).addScaledVector(_dir, endT),
      w.id==='licorne' ? 0xff8ad9 : 0xffd88f);
    for(const h of hits){
      let dm = w.dmg*dmgMul();
      if(w.id==='pompe') dm *= Math.max(0.35, 1 - h.t/w.range);
      hurtZombie(h.z, dm, _dir);
    }
  }
}
function hurtZombie(z, dm, dir){
  z.hp -= dm; z.hitT = 0.14;
  S.hitMark = 0.12;
  if(dir){ z.kb = Math.min(3.4, dm*0.11)/(z.boss?4:1)/z.size; z.kbx = dir.x; z.kbz = dir.z; }
  pops.push({x:z.x, z:z.z, y:2.0*z.size, t:0, kind:'dmg', val:Math.round(dm)});
  /* éclaboussure cartoon : confettis couleur peau */
  for(let i=0;i<4;i++){
    const m = new THREE.Mesh(new THREE.SphereGeometry(0.05+Math.random()*0.04, 6, 5),
      mat(z.def.skin));
    m.position.set(z.x+(Math.random()-0.5)*0.3, 1.2*z.size+(Math.random()-0.5)*0.4, z.z+(Math.random()-0.5)*0.3);
    scene.add(m);
    debris.push({m, vx:(dir?-dir.x:0)*2+(Math.random()-0.5)*3, vz:(dir?-dir.z:0)*2+(Math.random()-0.5)*3,
      vy:2+Math.random()*3, t:0});
  }
  if(z.hp <= 0) killZombie(z);
}
function killZombie(z){
  if(z._dead) return;
  z._dead = true;
  S.kills++;
  S.score += z.def.score*(z.boss?10:1);
  z.deathT = 0;           // animation de mort : catapulté + rotation
  z.dvy = 5 + Math.random()*3;
  sfxPouf();
  if(z.def.explode) explodeAt(z.x, z.z, z.boss?6:z.def.explode, z.boss?40:z.def.dmg, true);
  if(Math.random() < T.coinChance || z.boss){
    const n = z.boss ? 12 : (z.type==='tank'?3:1);
    for(let i=0;i<n;i++){
      const m = new THREE.Mesh(new THREE.OctahedronGeometry(0.16), mat(0xffd23e, {emissive:0xb97700, emissiveIntensity:0.6}));
      m.position.set(z.x+(Math.random()-0.5)*1.4, 0.4, z.z+(Math.random()-0.5)*1.4);
      scene.add(m);
      coins3d.push({m, t:Math.random()*7});
    }
  }
}
function explodeAt(x, z, r, dmg, hurtsPlayer){
  pops.push({x, z, y:0.9, t:0, kind:'boom', size:r});
  sfxBoom();
  S.shake = Math.max(S.shake, 0.55);
  S.flash = Math.max(S.flash, 0.25);
  boomLight.position.set(x, 2, z);
  boomLight.intensity = 60;
  for(let i=0;i<12;i++){
    const a = Math.random()*Math.PI*2, v = 4+Math.random()*8;
    const m = box(0.14+Math.random()*0.12, 0.14+Math.random()*0.12, 0.14+Math.random()*0.12,
      Math.random()<0.5 ? 0xff9d2e : 0x2b2320);
    m.position.set(x, 0.6, z);
    scene.add(m);
    debris.push({m, vx:Math.sin(a)*v, vz:Math.cos(a)*v, vy:5+Math.random()*7, t:0});
  }
  for(let i=0;i<5;i++) puff(x+(Math.random()-0.5)*r*0.7, 0.8+Math.random(), z+(Math.random()-0.5)*r*0.7, 1.2+Math.random(), 2.2);
  /* brûlure au sol */
  const sc = new THREE.Mesh(new THREE.CircleGeometry(r*0.75, 16).rotateX(-Math.PI/2),
    new THREE.MeshBasicMaterial({color:0x0a0808, transparent:true, opacity:0.65}));
  sc.position.set(x, 0.03+Math.random()*0.02, z);
  scene.add(sc);
  explodeAt._scars = explodeAt._scars || [];
  explodeAt._scars.push(sc);
  if(explodeAt._scars.length > 12) scene.remove(explodeAt._scars.shift());
  for(const zb of zombies){
    if(zb.hp<=0) continue;
    const d = Math.hypot(zb.x-x, zb.z-z);
    if(d < r+0.6) hurtZombie(zb, dmg*1.5*(1-d/(r+0.6)) + 8);
  }
  if(hurtsPlayer){
    const d = Math.hypot(S.px-x, S.pz-z);
    if(d < r) hurtPlayer(dmg*(1-d/r));
  }
}
function hurtPlayer(dm){
  if(S.boosts.bouclier > 0 || dm<=0) return;
  S.hp -= dm; S.hurtT = 0.3; S.regenT = 0;
  sfxHurt();
  document.getElementById('fx-hit').style.opacity = 0.8;
  setTimeout(()=>document.getElementById('fx-hit').style.opacity = 0, 220);
  S.shake = Math.max(S.shake, 0.25);
  if(S.hp <= 0 && S.scene==='play') gameOver();
}
function purgeDead(){
  for(let i=zombies.length-1;i>=0;i--){
    const z = zombies[i];
    if(z.hp<=0 && z.deathT===undefined){ scene.remove(z.g); zombies.splice(i,1); }
  }
}

/* ---------------- update ---------------- */
function update(dt){
  S.t += dt;
  for(const k in S.boosts) if(S.boosts[k] > 0) S.boosts[k] -= dt;
  /* déplacement */
  let mx = 0, mz = 0;
  if(keys['KeyW']) mz += 1;
  if(keys['KeyS']) mz -= 1;
  if(keys['KeyA']) mx -= 1;
  if(keys['KeyD']) mx += 1;
  if(joy){ mx += joy.dx; mz -= joy.dy; }
  const ml = Math.hypot(mx,mz);
  const moving = ml > 0.01;
  S.bobK += ((moving?1:0.1) - S.bobK)*Math.min(1, 8*dt);
  S.bobT += dt*(moving?1:0.3);
  if(moving){
    mx/=Math.max(1,ml); mz/=Math.max(1,ml);
    const sy = Math.sin(S.yaw), cy = Math.cos(S.yaw);
    /* avant = -Z tourné par yaw ; droite = (+cos, 0, -sin) */
    S.px += (-sy*mz + cy*mx)*T.pSpeed*dt;
    S.pz += (-cy*mz - sy*mx)*T.pSpeed*dt;
    const pd = Math.hypot(S.px, S.pz);
    if(pd > T.arenaR-1.6){ S.px *= (T.arenaR-1.6)/pd; S.pz *= (T.arenaR-1.6)/pd; }
  }
  /* aide à la visée tactile : la caméra glisse vers le plus menaçant */
  if(isTouch && !look){
    let bz = null, bs = 1e9;
    for(const z of zombies){
      if(z.hp<=0) continue;
      const d = Math.hypot(z.x-S.px, z.z-S.pz);
      let rel = Math.atan2(-(z.x-S.px), -(z.z-S.pz)) - S.yaw;
      rel = Math.atan2(Math.sin(rel), Math.cos(rel));
      const sc = d + Math.abs(rel)*14;
      if(sc < bs){ bs = sc; bz = {z, rel, d}; }
    }
    if(bz){
      S.yaw += bz.rel*Math.min(1, 6*dt);
      const want = Math.atan2(1.1*bz.z.size - T.camH, bz.d);
      S.pitch += (want - S.pitch)*Math.min(1, 4*dt);
    }
  }
  /* tir */
  S.fireT -= dt;
  const w = curW();
  let autoFire = false;
  if(isTouch){
    for(const z of zombies){
      if(z.hp>0 && Math.hypot(z.x-S.px, z.z-S.pz) < w.range){ autoFire = true; break; }
    }
  }
  const wantFire = S.firing || keys['Space'] || autoFire;
  if(wantFire && S.fireT <= 0 && (w.auto || !S._held)) fire();
  S._held = wantFire;
  /* régén */
  S.regenT += dt;
  if(S.regenT > T.regenDelay && S.hp < T.pHp) S.hp = Math.min(T.pHp, S.hp + T.regen*dt);
  /* spawn */
  if(spawnQueue.length && zombies.filter(z=>z.hp>0).length < T.aliveCap){
    spawnT -= dt;
    if(spawnT <= 0){
      spawnT = Math.max(0.18, 0.7 - S.wave*0.04);
      const nxt = spawnQueue.shift();
      if(nxt.startsWith('BOSS:')){ spawnZombie(nxt.slice(5), true); sfxDing(); }
      else spawnZombie(nxt);
    }
  }
  /* zombies */
  const slow = S.boosts.gel > 0 ? 0.5 : 1;
  for(const z of zombies){
    if(z.hp<=0){
      /* animation de mort : catapulté en tournoyant, puis disparaît */
      if(z.deathT !== undefined){
        z.deathT += dt;
        z.g.position.y += z.dvy*dt; z.dvy -= 16*dt;
        z.g.rotation.x += dt*7; z.g.rotation.z += dt*5;
        z.g.scale.multiplyScalar(Math.max(0.0001, 1-dt*1.2));
        if(z.deathT > 0.9){ scene.remove(z.g); z.deathT = undefined; }
      }
      continue;
    }
    z.ph += dt*6*slow*z.spd*0.5 + dt*4;
    z.hitT -= dt; z.groanT -= dt;
    if(z.groanT < 0){ z.groanT = 4+Math.random()*7;
      if(Math.random()<0.4 && Math.hypot(z.x-S.px,z.z-S.pz)<22) sfxGroan(); }
    const dx = S.px-z.x, dz = S.pz-z.z;
    const d = Math.hypot(dx,dz)||1;
    let sp = z.spd*slow;
    if(z.def.summon){
      if(d < 13) sp = -sp*0.7;
      z.sumT -= dt;
      if(z.sumT <= 0){
        z.sumT = z.boss ? 3.5 : 7;
        sfxDing();
        const n = z.boss ? 4 : 2;
        for(let i=0;i<n;i++){
          const a = Math.random()*Math.PI*2;
          spawnMini(z.x+Math.sin(a)*2, z.z+Math.cos(a)*2);
        }
      }
    }
    if(z.boss && z.type==='tank'){
      z.chargeT -= dt;
      if(z.chargeT < 0 && z.chargeT > -1.2){ sp = 0; }
      else if(z.chargeT <= -1.2 && z.chargeT > -3.2){
        if(!z.chargeDir) z.chargeDir = {x:dx/d, z:dz/d};
        z.x += z.chargeDir.x*9*slow*dt; z.z += z.chargeDir.z*9*slow*dt;
        sp = 0;
      } else if(z.chargeT <= -3.2){ z.chargeT = 4+Math.random()*3; z.chargeDir = null; }
    }
    if(z.def.explode){
      if(d < 2.2 && z.fuse < 0) z.fuse = 0.55;
      if(z.fuse >= 0){
        z.fuse -= dt; sp = 0;
        const g2 = 1 + (0.55-Math.max(0,z.fuse))*1.1;   // le ballon gonfle
        z.g.scale.setScalar(g2*z.bs);
        if(z.fuse <= 0){ z.hp = 0; killZombie(z); continue; }
      }
    }
    z.x += dx/d*sp*dt + z.kb*z.kbx*dt*8;
    z.z += dz/d*sp*dt + z.kb*z.kbz*dt*8;
    z.kb = Math.max(0, z.kb - dt*14);
    for(const o of zombies){
      if(o===z || o.hp<=0) continue;
      const ox = z.x-o.x, oz = z.z-o.z;
      const od = Math.hypot(ox,oz);
      const min = 0.55*(z.size+o.size);
      if(od < min && od > 0.001){ z.x += ox/od*(min-od)*0.4; z.z += oz/od*(min-od)*0.4; }
    }
    z.atkT -= dt;
    if(d < 1.5 + z.size*0.4 && z.atkT <= 0 && !z.def.explode){
      z.atkT = 1.0;
      hurtPlayer(z.def.dmg*(z.boss?2:1));
    }
    /* pose du modèle 3D */
    z.g.position.set(z.x, 0, z.z);
    z.g.rotation.y = Math.atan2(dx, dz);
    if(z.def.hop){
      z.hopT += dt*7;
      z.g.position.y = Math.abs(Math.sin(z.hopT))*1.1;
    }
    const sw = Math.sin(z.ph);
    z.parts.legL.rotation.x = sw*0.75;
    z.parts.legR.rotation.x = -sw*0.75;
    z.parts.armL.rotation.x = -1.35 + Math.sin(z.ph*0.9)*0.25;
    z.parts.armR.rotation.x = -1.35 - Math.sin(z.ph*0.9)*0.25;
    /* penché en avant, dandine ; le tank roule des épaules */
    z.parts.torso.rotation.x = 0.16 + Math.min(0.2, z.spd*0.04) + Math.sin(z.ph*0.5)*0.03;
    z.parts.torso.rotation.z = Math.sin(z.ph)*(z.type==='tank' ? 0.14 : 0.05);
    z.parts.head.rotation.z = Math.sin(z.ph*0.5)*0.14;
    z.parts.head.rotation.x = -z.parts.torso.rotation.x*0.7;   // il te garde dans les yeux
    z.parts.head.position.y = z.parts.headY + Math.abs(Math.sin(z.ph))*0.045;
    /* flash blanc + squash à l'impact ; mèche du ballon qui clignote */
    z.parts.skinMat.emissive.setHex(z.hitT > 0 ? 0xffffff : 0x000000);
    z.parts.skinMat.emissiveIntensity = z.hitT > 0 ? 0.85 : 0;
    if(z.parts.spark){
      z.parts.spark.visible = z.fuse >= 0 && Math.sin(S.t*40) > -0.4;
      if(z.fuse >= 0){
        z.parts.bodyMat.emissive.setHex(0xff2010);
        z.parts.bodyMat.emissiveIntensity = 0.3 + 0.5*Math.abs(Math.sin(S.t*22));
      }
    }
    if(z.fuse < 0){
      const squash = z.hitT > 0 ? 1.12 : 1;
      z.g.scale.set(z.bs*squash, z.bs/squash, z.bs*squash);
    }
    if(z.parts.hpbar){
      z.parts.hpbar.scale.x = Math.max(0.02, z.hp/z.hpMax);
      z.parts.hpbar.lookAt(cam.getWorldPosition(_tmp));
    }
  }
  purgeDead();
  /* grenades */
  for(let i=projs.length-1;i>=0;i--){
    const p = projs[i];
    p.m.position.x += p.vx*dt; p.m.position.y += p.vy*dt; p.m.position.z += p.vz*dt;
    p.vy -= 9.8*dt;
    let hit = p.m.position.y <= 0.05;
    for(const z of zombies){
      if(z.hp>0 && Math.hypot(z.x-p.m.position.x, z.z-p.m.position.z) < 1.3*z.size
         && p.m.position.y < 2.4*z.size){ hit = true; break; }
    }
    if(hit){
      explodeAt(p.m.position.x, p.m.position.z, p.w.aoe, p.w.dmg*dmgMul(), false);
      scene.remove(p.m);
      projs.splice(i,1);
    }
  }
  /* pièces */
  const magnet = S.boosts.aimant > 0 ? 11 : 2.4;
  for(let i=coins3d.length-1;i>=0;i--){
    const c = coins3d[i];
    c.t += dt;
    c.m.rotation.y += dt*4;
    c.m.position.y = 0.4 + Math.sin(c.t*3)*0.08;
    const d = Math.hypot(c.m.position.x-S.px, c.m.position.z-S.pz);
    if(d < magnet && d > 0.9){
      c.m.position.x += (S.px-c.m.position.x)/d*10*dt;
      c.m.position.z += (S.pz-c.m.position.z)/d*10*dt;
    }
    if(d < 1.0){
      scene.remove(c.m);
      coins3d.splice(i,1);
      S.coins += 1 + (S.wave>5?1:0);
      S.score += 2;
      sfxCoin();
    }
  }
  /* fin de vague */
  if(!spawnQueue.length && zombies.filter(z=>z.hp>0).length===0 && S.scene==='play'){
    S.score += S.wave*50;
    sfxFanfare();
    nextWave();
  }
}

/* ---------------- fumée : sprites recyclés ---------------- */
const smokeTex = (()=>{
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const x = c.getContext('2d');
  const gr = x.createRadialGradient(32,32,4,32,32,32);
  gr.addColorStop(0,'rgba(60,55,58,.55)'); gr.addColorStop(1,'rgba(60,55,58,0)');
  x.fillStyle = gr; x.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
})();
const SMOKE = [];
let smokeT = 0;
function puff(x, y, z, s, rise=1.1){
  if(SMOKE.length > 44) return;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({map:smokeTex, transparent:true, opacity:0.8, depthWrite:false}));
  sp.position.set(x, y, z);
  sp.scale.setScalar(s);
  scene.add(sp);
  SMOKE.push({sp, t:0, max:2.6+Math.random(), rise, s0:s});
}

/* ---------------- effets par frame (vivent aussi dans les menus) ---------------- */
const _wp = new THREE.Vector3();
function fxTick(dt){
  /* colonnes de fumée continues (bâtiments en feu, bus, ruines) */
  smokeT -= dt;
  if(smokeT <= 0){
    smokeT = 0.22;
    const src = SMOKERS[Math.floor(Math.random()*SMOKERS.length)];
    if(src){
      _wp.set(src.ox, src.oy, src.oz);
      src.obj.localToWorld(_wp);
      puff(_wp.x+(Math.random()-0.5)*0.6, _wp.y, _wp.z+(Math.random()-0.5)*0.6, src.s*(1.2+Math.random()*0.8), 1.5);
    }
    const f = FIRES[Math.floor(Math.random()*FIRES.length)];
    if(f) puff(f.x, f.y+1.2, f.z, 0.8+Math.random()*0.6, 1.2);
  }
  for(let i=SMOKE.length-1;i>=0;i--){
    const sm = SMOKE[i];
    sm.t += dt;
    sm.sp.position.y += sm.rise*dt;
    sm.sp.position.x += dt*0.5;                       // le vent
    sm.sp.scale.setScalar(sm.s0*(1+sm.t*0.9));
    sm.sp.material.opacity = 0.8*(1 - sm.t/sm.max);
    if(sm.t > sm.max){ scene.remove(sm.sp); SMOKE.splice(i,1); }
  }
  /* enseignes qui grésillent */
  for(const fl of FLICKERS){
    fl.m.material.emissiveIntensity = Math.sin(S.t*17+fl.ph) > -0.75 ? 0.9 : 0.08;
  }
  /* feux : flammes qui dansent + la lumière suit le feu le plus proche */
  let bestF = null, bestD = 1e9;
  for(const f of FIRES){
    for(let i=0;i<f.flames.length;i++){
      const fl = f.flames[i];
      const k = 0.8 + 0.35*Math.sin(S.t*11 + f.ph + i*2.1);
      fl.scale.set(1, k, 1);
      fl.rotation.y = Math.sin(S.t*7 + i*3)*0.3;
    }
    const d = Math.hypot(f.x-S.px, f.z-S.pz);
    if(d < bestD){ bestD = d; bestF = f; }
  }
  if(bestF){
    fireLight.position.set(bestF.x, bestF.y+1.2, bestF.z);
    fireLight.intensity = 1.3 + Math.sin(S.t*13)*0.5;
  }
  /* braises */
  for(let i=0;i<EMB_N;i++){
    embPos[i*3]   += embVel[i][0]*dt;
    embPos[i*3+1] += embVel[i][1]*dt + Math.sin(S.t*3+i)*0.4*dt;
    embPos[i*3+2] += embVel[i][2]*dt;
    if(embPos[i*3] < S.px-40 || embPos[i*3+1] > 14){
      embPos[i*3] = S.px + 25 + Math.random()*20;
      embPos[i*3+1] = Math.random()*3;
      embPos[i*3+2] = S.pz + (Math.random()-0.5)*60;
    }
  }
  embGeo.attributes.position.needsUpdate = true;
  /* débris */
  for(let i=debris.length-1;i>=0;i--){
    const d = debris[i];
    d.t += dt;
    d.m.position.x += d.vx*dt; d.m.position.z += d.vz*dt;
    d.m.position.y += d.vy*dt; d.vy -= 22*dt;
    d.m.rotation.x += dt*9; d.m.rotation.z += dt*7;
    if(d.m.position.y <= 0.08 || d.t > 2.5){ scene.remove(d.m); debris.splice(i,1); }
  }
  /* traceurs */
  for(let i=tracers.length-1;i>=0;i--){
    const t = tracers[i];
    t.t += dt;
    t.m.material.opacity = 0.9*(1 - t.t/0.09);
    if(t.t > 0.09){ scene.remove(t.m); tracers.splice(i,1); }
  }
  /* boule de feu 3D des explosions */
  for(let i=pops.length-1;i>=0;i--){
    const p = pops[i];
    p.t += dt;
    if(p.kind==='boom'){
      if(!p.m){
        p.m = new THREE.Mesh(new THREE.SphereGeometry(1, 12, 10),
          new THREE.MeshBasicMaterial({color:0xff9d2e, transparent:true, opacity:0.95, blending:THREE.AdditiveBlending, depthWrite:false}));
        p.m2 = new THREE.Mesh(new THREE.TorusGeometry(1, 0.14, 8, 24).rotateX(-Math.PI/2),
          new THREE.MeshBasicMaterial({color:0xffd88f, transparent:true, opacity:0.8, blending:THREE.AdditiveBlending, depthWrite:false}));
        p.m.position.set(p.x, 1.0, p.z);
        p.m2.position.set(p.x, 0.12, p.z);
        scene.add(p.m); scene.add(p.m2);
      }
      const k = p.t/0.55;
      p.m.scale.setScalar(0.4 + k*p.size*0.7);
      p.m.material.opacity = 0.95*(1-k);
      p.m.material.color.setHSL(0.07 - k*0.05, 1, 0.6 - k*0.25);
      p.m2.scale.setScalar(0.4 + k*p.size*1.1);
      p.m2.material.opacity = 0.8*(1-k);
      if(p.t > 0.55){ scene.remove(p.m); scene.remove(p.m2); pops.splice(i,1); }
    } else if(p.t > 0.7) pops.splice(i,1);
  }
  gunLight.intensity = Math.max(0, gunLight.intensity - dt*260);
  boomLight.intensity = Math.max(0, boomLight.intensity - dt*300);
  if(S.muzzle <= 0) muzzleSprite.visible = false;
  gunRecoil = Math.max(0, gunRecoil - dt*9);
}

/* ---------------- HUD 2D ---------------- */
const hx = hud.getContext('2d');
let W = 0, H = 0;
function drawHUD(){
  hx.clearRect(0,0,W,H);
  if(S.scene!=='play') return;
  /* viseur */
  hx.strokeStyle = 'rgba(255,255,255,.9)'; hx.lineWidth = 2;
  hx.beginPath();
  hx.moveTo(W/2-12, H/2); hx.lineTo(W/2-4, H/2);
  hx.moveTo(W/2+4, H/2); hx.lineTo(W/2+12, H/2);
  hx.moveTo(W/2, H/2-12); hx.lineTo(W/2, H/2-4);
  hx.moveTo(W/2, H/2+4); hx.lineTo(W/2, H/2+12);
  hx.stroke();
  if(S.hitMark > 0){
    hx.strokeStyle = `rgba(255,120,90,${S.hitMark/0.12})`; hx.lineWidth = 3;
    hx.beginPath();
    for(const [a,b,c,d] of [[-1,-1,-2,-2],[1,-1,2,-2],[-1,1,-2,2],[1,1,2,2]]){
      hx.moveTo(W/2+a*7, H/2+b*7); hx.lineTo(W/2+c*7, H/2+d*7);
    }
    hx.stroke();
  }
  /* dégâts flottants : projetés depuis le monde */
  _tmp2.setFromMatrixPosition(cam.matrixWorld);
  for(const p of pops){
    if(p.kind!=='dmg') continue;
    _v.set(p.x, p.y + p.t*1.6, p.z);
    _v.project(cam);
    if(_v.z > 1) continue;
    const sx = (_v.x*0.5+0.5)*W, sy = (-_v.y*0.5+0.5)*H;
    const a = 1 - p.t/0.7;
    hx.font = 'bold 22px "Trebuchet MS"';
    hx.textAlign = 'center';
    hx.strokeStyle = `rgba(90,40,0,${a*0.8})`; hx.lineWidth = 3;
    hx.fillStyle = `rgba(255,240,120,${a})`;
    hx.strokeText('-'+p.val, sx, sy);
    hx.fillText('-'+p.val, sx, sy);
  }
  /* barre de vie */
  const bw = Math.min(340, W*0.4);
  hx.fillStyle = 'rgba(0,0,0,.45)';
  hx.fillRect(20, 20, bw, 20);
  hx.fillStyle = S.hp > 30 ? '#6fd435' : '#ff5d5d';
  hx.fillRect(22, 22, (bw-4)*Math.max(0,S.hp)/T.pHp, 16);
  hx.font = 'bold 17px "Trebuchet MS"'; hx.textAlign = 'left';
  hx.fillStyle = '#fff';
  hx.fillText(`VAGUE ${S.wave}`, 20, 62);
  hx.fillStyle = '#ffd23e';
  hx.fillText(`🪙 ${S.coins}`, 20, 84);
  hx.fillStyle = '#fff';
  hx.textAlign = 'right';
  hx.fillText(`SCORE ${S.score}`, W-20, 32);
  const w = curW();
  hx.fillText(`${w.ico} ${w.nom}`, W-20, 56);
  const left = zombies.filter(z=>z.hp>0).length + spawnQueue.length;
  hx.textAlign = 'center';
  hx.fillStyle = 'rgba(255,255,255,.75)';
  hx.fillText(`${left} 🧟`, W/2, 30);
  let by = 108;
  hx.textAlign = 'left';
  for(const b of BOOSTS){
    if(S.boosts[b.k] > 0){
      hx.fillStyle = 'rgba(0,0,0,.4)';
      hx.fillRect(16, by-16, 78, 22);
      hx.fillStyle = '#e8c3ff';
      hx.fillText(`${b.ico} ${Math.ceil(S.boosts[b.k])}s`, 20, by);
      by += 26;
    }
  }
  if(S.boosts.bouclier > 0){
    hx.strokeStyle = 'rgba(120,200,255,.6)'; hx.lineWidth = 6;
    hx.strokeRect(4,4,W-8,H-8);
  }
  if(joy){
    hx.strokeStyle = 'rgba(255,255,255,.4)'; hx.lineWidth = 2;
    hx.beginPath(); hx.arc(joy.x0, joy.y0, 46, 0, 7); hx.stroke();
    hx.fillStyle = 'rgba(255,255,255,.5)';
    hx.beginPath(); hx.arc(joy.x0+joy.dx*40, joy.y0+joy.dy*40, 18, 0, 7); hx.fill();
  }
}
const _v = new THREE.Vector3(), _tmp2 = new THREE.Vector3();

/* ---------------- écrans ---------------- */
function hideAll(){
  for(const id of ['screen-start','screen-wave','screen-over'])
    document.getElementById(id).style.display = 'none';
}
function showMenu(){
  S.scene = 'menu';
  hideAll();
  document.getElementById('st-best').textContent = 'RECORD : ' + meta.best;
  document.getElementById('st-legend').textContent =
    meta.legend ? '🦄 RAYON LICORNE débloqué !' : `🦄 arme légendaire : atteins la vague 10 (record actuel : ${meta.maxWave})`;
  const rs = loadRun();
  document.getElementById('btn-resume').style.display = rs && rs.wave > 1 ? '' : 'none';
  if(rs) document.getElementById('rs-w').textContent = rs.wave;
  document.getElementById('screen-start').style.display = 'flex';
}
document.getElementById('btn-go').onclick = e => { e.target.blur(); initAudio(); clearRun(); newRun(false); };
document.getElementById('btn-resume').onclick = e => { e.target.blur(); initAudio(); newRun(true); };
document.getElementById('btn-retry').onclick = e => { e.target.blur(); initAudio();
  document.getElementById('screen-over').style.display='none'; newRun(false); };
document.getElementById('btn-menu').onclick = e => { e.target.blur();
  document.getElementById('screen-over').style.display='none'; showMenu(); };
document.getElementById('btn-continue').onclick = e => { e.target.blur();
  /* AD SLOT: rewarded — continuer la run avec sa puissance actuelle */
  showAd('rewarded', reviveRun);
};
document.getElementById('btn-next').onclick = e => { e.target.blur();
  clearInterval(nextWave._iv); startWave(); };
document.getElementById('btn-adboost').onclick = e => { e.target.blur();
  /* AD SLOT: rewarded — boost gratuit entre deux vagues */
  showAd('rewarded', ()=>{ giveBoost(BOOSTS[Math.floor(Math.random()*BOOSTS.length)].k); renderShop(); });
};
if(isTouch){
  document.getElementById('hud-touch').style.display = 'block';
  document.getElementById('btn-arme').style.display = 'block';
  document.getElementById('ctl-desk').style.display = 'none';
  document.getElementById('ctl-mob').style.display = 'block';
}
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) S._pausedHidden = true; });

/* ---------------- boucle ---------------- */
function resize(){
  W = innerWidth; H = innerHeight;
  renderer.setSize(W, H);
  cam.aspect = W/H;
  cam.updateProjectionMatrix();
  hud.width = W; hud.height = H;
}
addEventListener('resize', resize);
resize();
showMenu();

const clock = new THREE.Clock();
function loop(){
  requestAnimationFrame(loop);
  let dt = Math.min(clock.getDelta(), 0.05);
  if(S._pausedHidden){ S._pausedHidden = false; dt = 0; }
  if(S.scene==='play' && !adOpen) update(dt);
  else S.t += dt;
  fxTick(dt);
  S.muzzle -= dt; S.hurtT -= dt; S.hitMark -= dt;
  S.shake = Math.max(0, S.shake - dt*1.4);
  if(S.flash > 0) S.flash -= dt*1.6;
  /* caméra FPS : yaw + pitch + bob + recul + secousse + roulis de strafe */
  S._lean = (S._lean??0) + (((keys['KeyD']?1:0)-(keys['KeyA']?1:0) + (joy?joy.dx:0)) *0.025 - (S._lean??0))*Math.min(1,8*dt);
  cam.position.set(S.px, T.camH + Math.sin(S.bobT*9)*0.035*S.bobK, S.pz);
  cam.rotation.set(
    S.pitch + gunRecoil*0.035 + (S.shake>0 ? (Math.random()-0.5)*S.shake*0.06 : 0),
    S.yaw + (S.shake>0 ? (Math.random()-0.5)*S.shake*0.06 : 0),
    Math.sin(S.bobT*4.5)*0.006*S.bobK - S._lean);
  /* FOV : kick au tir et aux explosions */
  const wantFov = 75 + gunRecoil*4 + Math.max(0,S.flash)*22;
  if(Math.abs(wantFov - cam.fov) > 0.05){ cam.fov = wantFov; cam.updateProjectionMatrix(); }
  gunGrp.position.set(0.24 + Math.sin(S.bobT*4.5)*0.008*S.bobK,
    -0.2 + Math.abs(Math.sin(S.bobT*9))*0.012*S.bobK + gunRecoil*0.02,
    -0.45 + gunRecoil*0.09);
  gunGrp.rotation.x = gunRecoil*0.32;
  gunLight.position.copy(muzzlePos(_tmp));
  sky.position.set(S.px, 0, S.pz);
  renderer.render(scene, cam);
  drawHUD();
  /* flash d'explosion par-dessus */
  if(S.flash > 0){
    hx.fillStyle = `rgba(255,190,110,${Math.max(0,S.flash)})`;
    hx.fillRect(0,0,W,H);
  }
}
loop();

/* ---------------- hooks de test ---------------- */
window.__horde = { S, T, get zombies(){ return zombies; }, get coins3d(){ return coins3d; },
  get projs(){ return projs; }, get debris(){ return debris; }, get pops(){ return pops; },
  get spawnQueue(){ return spawnQueue; },
  ZTYPES, WEAPONS, BOOSTS, meta, cam, scene, THREE,
  newRun, startWave, nextWave, spawnZombie, gameOver, reviveRun, giveBoost, fire, renderShop,
  explodeAt, setWeapon, showAd, loadRun, saveRun,
  killAll: ()=>{ spawnQueue.length = 0; for(const z of zombies){ z.hp = 0; killZombie(z); } purgeDead(); },
  addCoins: n => S.coins += n,
  setLook: (y,p) => { S.yaw = y; S.pitch = p; },
};
