];
let prog = +(localStorage.getItem('ic-prog') || 0);
let cur = 0;
let endlessLvl = 0;

/* ================= hangar : drones & crédits ================= */
const DRONES = [
  { id:'vector', name:'VECTOR', ty:'STANDARD', price:0,
    desc:"Le drone d'entraînement de la division. Fiable, sans plus.",

  { id:'zoom4', name:'OPTIQUE ×4', ty:'MODULE', price:1200,
    desc:"Objectif longue portée : le double-clic enchaîne ×2 puis ×4." },
];
let shopState = { owned:['vector'], cur:'vector', mods:[] };
try{ shopState = Object.assign(shopState, JSON.parse(localStorage.getItem('ic-shop')||'{}')); }catch(e){}
let credits = +(localStorage.getItem('ic-credits') || 0);
let stars = [];
try{ stars = JSON.parse(localStorage.getItem('ic-stars')||'[]'); }catch(e){}
const EFF = { spd:1, drain:1, alarm:1, zoomMax:2 };
function applyEff(){
  const d = DRONES.find(x=>x.id===shopState.cur) || DRONES[0];
  EFF.spd = d.spd; EFF.drain = d.drain; EFF.alarm = d.alarm;
  EFF.zoomMax = shopState.mods.includes('zoom4') ? 4 : 2;
}

}

/* ================= audio (WebAudio, zéro fichier) ================= */
const AU = { ctx:null };
function initAudio(){
  if(AU.ctx){ AU.ctx.resume && AU.ctx.resume(); return; }
  const C = AU.ctx = new (window.AudioContext || window.webkitAudioContext)();
  AU.master = C.createGain(); AU.master.gain.value = 0.5; AU.master.connect(C.destination);
  /* moteurs : 2 dents de scie désaccordées + passe-bas */
  const lp = C.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 850;
  AU.mGain = C.createGain(); AU.mGain.gain.value = 0;
  AU.o1 = C.createOscillator(); AU.o1.type = 'sawtooth'; AU.o1.frequency.value = 90;
  AU.o2 = C.createOscillator(); AU.o2.type = 'sawtooth'; AU.o2.frequency.value = 92;
  AU.o1.connect(lp); AU.o2.connect(lp); lp.connect(AU.mGain); AU.mGain.connect(AU.master);
  AU.o1.start(); AU.o2.start();
  /* vent : bruit blanc en passe-bande */
  const buf = C.createBuffer(1, C.sampleRate*2, C.sampleRate);
  const dd = buf.getChannelData(0);
  for(let i=0;i<dd.length;i++) dd[i] = Math.random()*2-1;
  const wind = C.createBufferSource(); wind.buffer = buf; wind.loop = true;
  const bp = C.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 500; bp.Q.value = 0.5;
  AU.wGain = C.createGain(); AU.wGain.gain.value = 0;
  wind.connect(bp); bp.connect(AU.wGain); AU.wGain.connect(AU.master);
  wind.start();
  /* alarme : triangle modulé */
  AU.aOsc = C.createOscillator(); AU.aOsc.type = 'triangle'; AU.aOsc.frequency.value = 600;
  AU.aGain = C.createGain(); AU.aGain.gain.value = 0;
  AU.aOsc.connect(AU.aGain); AU.aGain.connect(AU.master);
  AU.aOsc.start();
}
function tone(f, dur, type='sine', vol=0.22, slideTo){
  if(!AU.ctx) return;
  const C = AU.ctx, o = C.createOscillator(), g = C.createGain();
  o.type = type; o.frequency.setValueAtTime(f, C.currentTime);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, C.currentTime+dur);
  g.gain.setValueAtTime(vol, C.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, C.currentTime+dur);
  o.connect(g); g.connect(AU.master);
  o.start(); o.stop(C.currentTime+dur+0.02);
}
function sfxShutter(){
  tone(1700, 0.05, 'square', 0.18);
  if(!AU.ctx) return;
  const C = AU.ctx, b = C.createBuffer(1, C.sampleRate*0.07|0, C.sampleRate);
  const dd = b.getChannelData(0);
  for(let i=0;i<dd.length;i++) dd[i] = (Math.random()*2-1)*(1-i/dd.length);
  const s = C.createBufferSource(); s.buffer = b;
  const g = C.createGain(); g.gain.value = 0.28;
  s.connect(g); g.connect(AU.master); s.start();
}
function sfxRing(){ tone(880, 0.16, 'sine', 0.3, 1320); tone(1760, 0.12, 'sine', 0.12); }
function sfxWin(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'triangle',0.25), i*110)); }
function sfxFail(){ tone(320, 0.6, 'sawtooth', 0.2, 110); }
function sfxBuy(){ tone(700,0.08,'square',0.2); setTimeout(()=>tone(1050,0.12,'square',0.2), 70); }
function updateAudio(dt){
  if(!AU.ctx) return;
  const spd = S.vel.length();
  const fly = S.flying ? 1 : 0;
  const mT = fly ? 0.09 + (spd/(T.maxSpd*EFF.spd))*0.13 + (S.boost?0.07:0) : 0;
  AU.mGain.gain.value += (mT - AU.mGain.gain.value)*Math.min(1, 8*dt);
  const base = 78 + spd*2.3 + (S.boost? 28:0);
  AU.o1.frequency.value = base; AU.o2.frequency.value = base*1.022;
  const wT = fly ? Math.min(0.42, (spd/(T.maxSpd*EFF.spd))**2*0.38) : 0;
  AU.wGain.gain.value += (wT - AU.wGain.gain.value)*Math.min(1, 6*dt);
  const a = S.flying ? S.alarm/100 : 0;
  AU.aGain.gain.value = a > 0.02 ? 0.04 + a*0.11 : 0;
  if(a > 0.02) AU.aOsc.frequency.value = 480 + 280*(0.5+0.5*Math.sin(performance.now()/110));
}

/* ================= état ================= */
const S = {
  pos: new THREE.Vector3(0,22,150), vel: new THREE.Vector3(),
  yaw: 0, pitch: -0.12,
  flying: false, crashed: false,
  batt: 100, timer: 100,
  lockT: 0, escapeT: 0, alarm: 0,
  zoom: 1, zoomT: 1, photoCd: 0,
  score: 0, best: +(localStorage.getItem('ic-best')||0),
  boost: false, briefT: 0,
};
const keys = {};

/* ================= scène & éclairages par heure ================= */
const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('c3d'), antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a0e16, 60, 430);
const cam = new THREE.PerspectiveCamera(78, 1, 0.1, 1500);

const sun = new THREE.DirectionalLight(0xffe8c8, 2.2); sun.position.set(-160, 190, 90); scene.add(sun);
const hemi = new THREE.HemisphereLight(0xbdd7f0, 0x8a8578, 1.0); scene.add(hemi);
const amb = new THREE.AmbientLight(0x2a2018, 0.4); scene.add(amb);

const TOD = {
  day:  { fog:0xb9c8d2, near:120, far:760, sunC:0xfff2dd, sunI:2.6, sunPos:[120,220,60],
          hemiS:0xbdd7f0, hemiG:0x8a8578, hemiI:1.05, ambI:0.25,
          top:[0.42,0.62,0.85], mid:[0.66,0.78,0.90], low:[0.82,0.87,0.92], stars:0 },
  dusk: { fog:0x9c8496, near:90, far:600, sunC:0xffa562, sunI:1.9, sunPos:[-220,60,140],
          hemiS:0x8878a0, hemiG:0x54483e, hemiI:0.8, ambI:0.4,
          top:[0.16,0.20,0.38], mid:[0.72,0.45,0.38], low:[0.95,0.66,0.38], stars:0.3 },
  night:{ fog:0x0a0e16, near:60, far:430, sunC:0x8fb4ff, sunI:0.85, sunPos:[-160,190,90],
          hemiS:0x1c2a44, hemiG:0x05060a, hemiI:0.7, ambI:0.5,
          top:[0.012,0.02,0.045], mid:[0.05,0.07,0.13], low:[0.38,0.19,0.09], stars:1 },
};
let tod = 'night';
const skyU = {
  uTop:{value:new THREE.Vector3()}, uMid:{value:new THREE.Vector3()},
  uLow:{value:new THREE.Vector3()}, uStars:{value:1},
};
{
  const geo = new THREE.SphereGeometry(1100, 24, 16);
  const mat = new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite: false, fog: false, uniforms: skyU,
    vertexShader: `varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
    fragmentShader: `varying vec3 vP;
      uniform vec3 uTop,uMid,uLow; uniform float uStars;
      void main(){
        vec3 n = normalize(vP);
        float h = n.y;
        vec3 c = h > 0.2 ? mix(uMid, uTop, (h-0.2)/0.8) : mix(uLow, uMid, clamp(h,0.,0.2)/0.2);
        vec3 f = floor(n*300.);
        float hsh = fract(sin(dot(f, vec3(12.9898,78.233,37.719)))*43758.5453);
        if(h > 0.08 && hsh > 0.996) c += vec3(0.9,0.95,1.0)*(hsh-0.996)/0.004*0.85*uStars;
        gl_FragColor = vec4(c,1.);
      }`
  });
  scene.add(new THREE.Mesh(geo, mat));
}
function applyTod(name){
  tod = name;
  const p = TOD[name];
  scene.fog.color.setHex(p.fog); scene.fog.near = p.near; scene.fog.far = p.far;
  sun.color.setHex(p.sunC); sun.intensity = p.sunI; sun.position.set(...p.sunPos);
  hemi.color.setHex(p.hemiS); hemi.groundColor.setHex(p.hemiG); hemi.intensity = p.hemiI;
  amb.intensity = p.ambI;
  skyU.uTop.value.set(...p.top); skyU.uMid.value.set(...p.mid); skyU.uLow.value.set(...p.low);
  skyU.uStars.value = p.stars;
}
/* sol : terre/herbe rase */
{
  const cnv = document.createElement('canvas'); cnv.width = cnv.height = 256;
  const g = cnv.getContext('2d');
  g.fillStyle = '#5f6353'; g.fillRect(0,0,256,256);
  for(let i=0;i<900;i++){ g.fillStyle = `rgba(${60+Math.random()*30|0},${64+Math.random()*30|0},${46+Math.random()*24|0},.5)`;
    g.fillRect(Math.random()*256, Math.random()*256, 2+Math.random()*4, 2+Math.random()*4); }
  const tex = new THREE.CanvasTexture(cnv); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(60,60);
  const m = new THREE.Mesh(new THREE.PlaneGeometry(1600,1600), new THREE.MeshLambertMaterial({map: tex}));
  m.rotation.x = -Math.PI/2; scene.add(m);
}
/* routes (grille 5×5) + passages piétons fusionnés */
const ROAD_XZ = [-160,-80,0,80,160];
const NODES = [];
for(const x of ROAD_XZ) for(const z of ROAD_XZ) NODES.push(new THREE.Vector3(x,0,z));
{
  const c = document.createElement('canvas'); c.width = 128; c.height = 512;
  const g = c.getContext('2d'); g.fillStyle = '#33353a'; g.fillRect(0,0,128,512);
  g.strokeStyle = 'rgba(225,228,235,.6)'; g.lineWidth = 4; g.setLineDash([26,30]);
  g.beginPath(); g.moveTo(64,0); g.lineTo(64,512); g.stroke();
  for(let i=0;i<300;i++){ g.fillStyle = 'rgba(0,0,0,.28)'; g.fillRect(Math.random()*128, Math.random()*512, 3, 3); }
  const t = new THREE.CanvasTexture(c); t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(1,6);
  const roadMat = new THREE.MeshLambertMaterial({map: t});
  for(const k of ROAD_XZ){
    const r1 = new THREE.Mesh(new THREE.PlaneGeometry(11, 340), roadMat);
    r1.rotation.x = -Math.PI/2; r1.position.set(k, 0.02, 0); scene.add(r1);
    const r2 = new THREE.Mesh(new THREE.PlaneGeometry(11, 340), roadMat);
    r2.rotation.x = -Math.PI/2; r2.rotation.z = Math.PI/2; r2.position.set(0, 0.02, k); scene.add(r2);
  }
  /* zebra */
  const zc = document.createElement('canvas'); zc.width = 64; zc.height = 32;
  const zg = zc.getContext('2d'); zg.fillStyle = '#33353a'; zg.fillRect(0,0,64,32);
  zg.fillStyle = 'rgba(230,232,238,.85)';
  for(let x=4; x<64; x+=12) zg.fillRect(x,2,6,28);
  const zebraTex = new THREE.CanvasTexture(zc);
  const parts = [];
  for(const x of ROAD_XZ) for(const z of ROAD_XZ){
    for(const [ox,oz,rot] of [[0,8.2,0],[0,-8.2,0],[8.2,0,Math.PI/2],[-8.2,0,Math.PI/2]]){
      const p = new THREE.PlaneGeometry(10.5,3.4);
      p.rotateX(-Math.PI/2); p.rotateY(rot);
      p.translate(x+ox, 0.03, z+oz);
      parts.push(p);
    }
  }
  const zebra = new THREE.Mesh(mergeGeometries(parts), new THREE.MeshLambertMaterial({map: zebraTex}));
  scene.add(zebra);
}
/* halo réutilisable */
const glowTex = (()=>{
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(32,32,2, 32,32,30);
  grad.addColorStop(0,'rgba(255,205,130,.95)'); grad.addColorStop(0.35,'rgba(255,170,80,.4)'); grad.addColorStop(1,'rgba(255,150,60,0)');
  g.fillStyle = grad; g.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
})();

/* ================= monde reconstructible ================= */
let colliders = [];
let cityGrp = null;
let blinkers = [];
let searchlights = [];
let photoTargets = [];
let rings = [];
let ringIdx = 0;
let seed = 7;
const rnd = () => (seed = (seed*16807)%2147483647) / 2147483647;
const NEON_COLORS = [0xff2d78, 0x27e8ff, 0xffb020, 0x8f4dff, 0x35ff9a];
const built = [];
const isNight = () => tod === 'night';
const isDay = () => tod === 'day';

function addCollider(x,z,w,d,h,y0=0){
  colliders.push({min: new THREE.Vector3(x-w/2-0.5, y0, z-d/2-0.5), max: new THREE.Vector3(x+w/2+0.5, y0+h+0.5, z+d/2+0.5)});
}
/* façade : couleur de murs + fenêtres (allumées la nuit, vitres le jour) */
function facadeTex(w,h,wall,dark){
  const c = document.createElement('canvas'); c.width = 64; c.height = 64;
  const g = c.getContext('2d');
  g.fillStyle = wall; g.fillRect(0,0,64,64);
  const litRate = isDay() ? 0 : (tod==='dusk' ? 0.2 : (dark ? 0.08 : 0.42));
  for(let y=8;y<60;y+=14) for(let x=6;x<58;x+=12){
    if(rnd() < litRate){
      const warm = rnd() < 0.72, a = 0.55 + rnd()*0.45;
      g.fillStyle = warm ? `rgba(255,${170+rnd()*50|0},${70+rnd()*40|0},${a})`
                         : `rgba(150,${200+rnd()*40|0},255,${a})`;
    } else g.fillStyle = isDay() ? 'rgba(52,66,84,.9)' : 'rgba(14,16,22,.95)';
    g.fillRect(x,y,7,9);
    g.strokeStyle = 'rgba(0,0,0,.25)'; g.strokeRect(x,y,7,9);
  }
  const t = new THREE.CanvasTexture(c); t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(Math.max(1,Math.round(w/12)), Math.max(1,Math.round(h/10)));
  return t;
}
function facadeMat(w,h,wall,dark){
  const t = facadeTex(w,h,wall,dark);
  const m = new THREE.MeshLambertMaterial({map: t});
  if(!isDay()){ m.emissive = new THREE.Color(0xffffff); m.emissiveMap = t; m.emissiveIntensity = tod==='dusk'? 0.45 : 0.9; }
  return m;
}
function roofProps(x,z,w,d,h){
  const grey = new THREE.MeshLambertMaterial({color: 0x8a8d92});
  const n = 1 + (rnd()*3|0);
  for(let i=0;i<n;i++){
    const bw = 1.6+rnd()*2.4, bh = 1+rnd()*1.4;
    const b = new THREE.Mesh(new THREE.BoxGeometry(bw,bh,bw), grey);
    b.position.set(x + (rnd()-0.5)*(w-6), h+bh/2, z + (rnd()-0.5)*(d-6));
    cityGrp.add(b);
  }
  if(rnd()<0.3){   // réservoir d'eau
    const tank = new THREE.Mesh(new THREE.CylinderGeometry(1.3,1.3,2.6,8), new THREE.MeshLambertMaterial({color:0x6a5648}));
    tank.position.set(x + (rnd()-0.5)*(w-8), h+2.4, z + (rnd()-0.5)*(d-8));
    cityGrp.add(tank);
  }
}
const WALL_MID = ['#b58a72','#cfc4ae','#d8d8d2','#95a2b0','#c2a88c','#a8b0a0','#c8b8b8'];
const ROOF_MID = [0x5f6266, 0x77706a, 0x555a60, 0x6e6258];
function buildingMid(x,z,w,d,h,edgeRotY){
  const wall = WALL_MID[rnd()*WALL_MID.length|0];
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), facadeMat(Math.max(w,d),h,wall,rnd()<0.2));
  m.position.set(x, h/2, z); if(edgeRotY) m.rotation.y = 0;
  cityGrp.add(m);
  const roof = new THREE.Mesh(new THREE.BoxGeometry(w*0.98, 0.5, d*0.98),
    new THREE.MeshLambertMaterial({color: ROOF_MID[rnd()*ROOF_MID.length|0]}));
  roof.position.set(x, h+0.25, z); cityGrp.add(roof);
  addCollider(x,z,w,d,h+0.6);
  built.push({x,z,w,d,h});
  roofProps(x,z,w,d,h+0.5);
  if(!isDay() && rnd() < 0.3 && h > 14){
    const nw = 4 + rnd()*7, nh = 1.3 + rnd()*1.6, ny = h*(0.4 + rnd()*0.4);
    const neon = new THREE.Mesh(new THREE.PlaneGeometry(nw, nh),
      new THREE.MeshBasicMaterial({color: NEON_COLORS[rnd()*NEON_COLORS.length|0]}));
    const face = rnd()*4|0;
    if(face===0){ neon.position.set(x + w/2 + 0.25, ny, z); neon.rotation.y = Math.PI/2; }
    if(face===1){ neon.position.set(x - w/2 - 0.25, ny, z); neon.rotation.y = -Math.PI/2; }
    if(face===2){ neon.position.set(x, ny, z + d/2 + 0.25); }
    if(face===3){ neon.position.set(x, ny, z - d/2 - 0.25); neon.rotation.y = Math.PI; }
    cityGrp.add(neon);
  }
}
function buildingTower(x,z,w,d,h){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), facadeMat(Math.max(w,d),h,'#8fa4b8',false));
  m.position.set(x, h/2, z); cityGrp.add(m);
  addCollider(x,z,w,d,h);
  built.push({x,z,w,d,h});
  if(rnd()<0.5){ // couronne en retrait
    const w2 = w*0.55, h2 = 4+rnd()*7;
    const m2 = new THREE.Mesh(new THREE.BoxGeometry(w2,h2,d*0.55), facadeMat(w2,h2,'#7d92a6',false));
    m2.position.set(x, h+h2/2, z); cityGrp.add(m2);
    addCollider(x,z,w2,d*0.55,h2,h);
  } else roofProps(x,z,w,d,h);
  if(isNight() || tod==='dusk') blinker(x, h+(rnd()<0.5?0:6)+1.5, z);
}
const WALL_HOUSE = ['#d9cfc0','#cbb8a4','#c2c8cc','#d3c6ab','#c9b8b0','#b9c4b4'];
const ROOF_HOUSE = [0x8a4a34, 0x74402e, 0x4a4d54, 0x5c4638, 0x93553c];
function house(x,z){
  const w = 7+rnd()*3.5, d = 6+rnd()*3, h = 3.6+rnd()*2, ry = rnd()*Math.PI;
  const wall = WALL_HOUSE[rnd()*WALL_HOUSE.length|0];
  const body = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), facadeMat(Math.max(w,d),h,wall,rnd()<0.3));
  body.position.set(x,h/2,z); body.rotation.y = ry; cityGrp.add(body);
  const roof = new THREE.Mesh(new THREE.ConeGeometry(Math.max(w,d)*0.72, 2.2+rnd()*1.4, 4),
    new THREE.MeshLambertMaterial({color: ROOF_HOUSE[rnd()*ROOF_HOUSE.length|0], flatShading:true}));
  roof.position.set(x, h+1.2, z); roof.rotation.y = ry + Math.PI/4;
  roof.scale.set(1, 1, d/Math.max(w,d));
  cityGrp.add(roof);
  addCollider(x,z,Math.max(w,d),Math.max(w,d),h+2.6);
}
function tree(x,z,big){
  const s = big? 1.4 : 1;
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25*s,0.4*s,2.8*s,6), new THREE.MeshLambertMaterial({color:0x4a3826}));
  trunk.position.set(x,1.4*s,z); cityGrp.add(trunk);
  const greens = [0x4a7038, 0x3d6630, 0x557a40, 0x486c34];
  const crown = new THREE.Mesh(new THREE.IcosahedronGeometry((2.2+rnd()*1.4)*s,0),
    new THREE.MeshLambertMaterial({color: greens[rnd()*greens.length|0], flatShading:true}));
  crown.position.set(x, (4.4+rnd())*s, z); crown.scale.y = 1.25; cityGrp.add(crown);
  addCollider(x,z,1.2,1.2,6*s);
}
function lamp(px,pz){

  pole.position.set(px, 3.5, pz); cityGrp.add(pole);

const lampGeo = new THREE.CylinderGeometry(0.12,0.16,7,6);
const lampMat = new THREE.MeshLambertMaterial({color: 0x3a3d42});
function blinker(x,y,z,color=0xff3030){

function antenna(x,z,ytop){

function searchlight(x,z,h,detect,spd){
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.5,h,6), new THREE.MeshLambertMaterial({color:0x2c2f36}));
  pole.position.set(x, h/2, z); cityGrp.add(pole);
  const spot = new THREE.SpotLight(0xfff0c8, 900, 130, 0.30, 0.45, 1.2);
  spot.position.set(x, h, z);
  const tgt = new THREE.Object3D(); cityGrp.add(tgt);
  spot.target = tgt; cityGrp.add(spot);
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({map: glowTex, color:0xfff4d0, blending: THREE.AdditiveBlending, depthWrite:false, transparent:true}));
  spr.scale.set(9,9,1); spr.position.set(x, h+0.5, z); cityGrp.add(spr);
  searchlights.push({spot, tgt, x, z, h, ph: rnd()*6, spd: spd||0.5, r: 26+rnd()*10, detect});
}
function containerStack(x,z){
  const cols = [0xa63c2e, 0x2e6ba6, 0x2f8f52, 0xc7952f, 0x6a4f9a];
  const n = 2 + (rnd()*3|0);
  for(let i=0;i<n;i++){
    const lx = x + (rnd()*8-4), lz = z + (rnd()*8-4), ly = i*2.6;

      new THREE.MeshLambertMaterial({color: cols[rnd()*cols.length|0]}));
    m.position.set(lx, ly+1.25, lz); m.rotation.y = (rnd()<0.5?0:Math.PI/2) + rnd()*0.15;
    cityGrp.add(m);
  }
  addCollider(x, z, 11, 11, n*2.6);
}
function crane(x,z){

function warehouse(x,z,label){

  };
  mk(34,9,1, 0,4.5,11);
  mk(1,9,22, -17,4.5,0);
  mk(1,9,22, 17,4.5,0);
  mk(13.5,9,1, -10.2,4.5,-11);
  mk(13.5,9,1, 10.2,4.5,-11);
  mk(34,1,22, 0,9,0);
  const crate = new THREE.Mesh(new THREE.BoxGeometry(3.4,2.2,2.2), new THREE.MeshLambertMaterial({color:0x7a6a3a}));
  crate.position.set(x+6, 1.1, z+5); cityGrp.add(crate);
  const crate2 = crate.clone(); crate2.position.set(x+3.4, 1.1, z+6.4); crate2.rotation.y = 0.5; cityGrp.add(crate2);
  const gl = new THREE.Sprite(new THREE.SpriteMaterial({map: glowTex, color:0x9adfff, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true}));

function ring(x,y,z){

const CAR_COLORS = [0xc23b2e, 0x2e5fc2, 0xd8d9dd, 0xd9b12e, 0x8a929c, 0x2f8f52, 0x14161c];
function parkedCar(x,z,ry){
  const m = new THREE.Mesh(carGeoShared, new THREE.MeshLambertMaterial({color: CAR_COLORS[rnd()*CAR_COLORS.length|0]}));
  m.position.set(x, 0.75, z); m.rotation.y = ry;
  cityGrp.add(m);
  addCollider(x, z, 4.6, 4.6, 1.6);
}
const carGeoShared = new THREE.BoxGeometry(4.2,1.5,2);

function buildWorld(def){
  if(cityGrp) scene.remove(cityGrp);
  cityGrp = new THREE.Group(); scene.add(cityGrp);
  colliders = []; blinkers = []; searchlights = []; photoTargets = []; rings = []; ringIdx = 0;
  built.length = 0;
  seed = (def.map?.seed || 7);
  applyTod(def.tod || 'night');
  const docks = !!def.map?.docks;
  const parkBlock = rnd()*16|0;
  const dockBlock = docks ? ((parkBlock+7)%16) : -1;
  const wareBlock = (def.type==='infil') ? ((parkBlock+11)%16) : -1;
  const meetBlock = def.meeting ? ((parkBlock+5)%16) : -1;

  const sideMat = new THREE.MeshLambertMaterial({color: 0x84878c});
  const yardMat = new THREE.MeshLambertMaterial({color: 0x55703f});

  let bi = 0;
  for(let bx=0; bx<4; bx++) for(let bz=0; bz<4; bz++, bi++){
    const cx0 = -160 + bx*80, cz0 = -160 + bz*80;   // coin du bloc
    const cx = cx0 + 40, cz = cz0 + 40;             // centre du bloc
    /* trottoir du bloc */
    const sw = new THREE.Mesh(new THREE.PlaneGeometry(62,62), sideMat);
    sw.rotation.x = -Math.PI/2; sw.position.set(cx, 0.015, cz); cityGrp.add(sw);

    if(bi === parkBlock){
      const lawn = new THREE.Mesh(new THREE.PlaneGeometry(56,56), yardMat);
      lawn.rotation.x = -Math.PI/2; lawn.position.set(cx, 0.03, cz); cityGrp.add(lawn);
      for(let i=0;i<11;i++) tree(cx0 + 16 + rnd()*48, cz0 + 16 + rnd()*48, rnd()<0.4);
      continue;
    }
    if(bi === dockBlock){
      for(let i=0;i<5;i++) containerStack(cx0 + 18 + rnd()*44, cz0 + 18 + rnd()*44);
      crane(cx0 + 40, cz0 + 40);
      continue;
    }
    if(bi === wareBlock){
      warehouse(cx, cz, def.hard ? 'SERVEURS' : "CAISSES D'ARMES");
      searchlight(cx - 14, cz - 26, 14, true, def.hard ? 0.85 : 0.55);
      if((def.lights||0) > 1) searchlight(cx + 16, cz - 22, 14, true, 0.7);
      continue;
    }
    if(bi === meetBlock){
      /* cour de réunion entourée de 3 immeubles */
      buildingMid(cx-18, cz-14, 22, 13, 14+rnd()*8);
      buildingMid(cx+18, cz-12, 20, 13, 12+rnd()*8);
      buildingMid(cx, cz+18, 30, 13, 16+rnd()*8);
      const yard = new THREE.Mesh(new THREE.PlaneGeometry(30,22), new THREE.MeshLambertMaterial({color:0x3f4247}));
      yard.rotation.x = -Math.PI/2; yard.position.set(cx, 0.03, cz-2); cityGrp.add(yard);
      for(const [ox,oz,c] of [[-4,-2,0x14161c],[4,-1,0x23262e]]){
        const cm = new THREE.Mesh(carGeoShared, new THREE.MeshLambertMaterial({color:c}));
        cm.position.set(cx+ox, 0.75, cz+oz); cm.rotation.y = rnd(); cityGrp.add(cm);
        addCollider(cx+ox, cz+oz, 4.6, 4.6, 1.6);
      }
      for(let i=0;i<4;i++){
        const p = new THREE.Mesh(new THREE.BoxGeometry(0.55,1.7,0.4), new THREE.MeshLambertMaterial({color:0x0e1014}));
        p.position.set(cx + Math.sin(i*1.7)*1.8, 0.85, cz-2 + Math.cos(i*1.7)*1.8); cityGrp.add(p);
      }
      const gl = new THREE.Sprite(new THREE.SpriteMaterial({map: glowTex, color:0xffd9a0, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true}));
      gl.scale.set(10,10,1); gl.position.set(cx, 4, cz-2); cityGrp.add(gl);
      photoTargets.push({pos: new THREE.Vector3(cx, 1.2, cz-2), label:'LA RÉUNION', done:false, range:60, needZoom:true});
      searchlight(cx-20, cz-24, 13, true, 0.5);
      if((def.lights||0) > 1) searchlight(cx+20, cz-22, 13, true, 0.65);
      if((def.lights||0) > 2) searchlight(cx, cz+26, 13, true, 0.75);
      continue;
    }

    const downtown = (bx===1||bx===2) && (bz===1||bz===2);
    const suburb = (bx===0||bx===3) && (bz===0||bz===3);
    if(downtown){
      const n = 2 + (rnd()*2|0);
      for(let i=0;i<n;i++){
        const w = 16+rnd()*14, d = 16+rnd()*14, h = 30+rnd()*34;
        buildingTower(cx0 + 16 + w/2 + rnd()*(80-32-w), cz0 + 16 + d/2 + rnd()*(80-32-d), w, d, h);
      }
      for(let i=0;i<3;i++) tree(cx0 + 16 + rnd()*48, cz0 + 16 + rnd()*48, false);
    } else if(suburb){
      /* pavillons en grille + jardins */
      const lawn = new THREE.Mesh(new THREE.PlaneGeometry(56,56), yardMat);
      lawn.rotation.x = -Math.PI/2; lawn.position.set(cx, 0.025, cz); cityGrp.add(lawn);
      for(let gx=0; gx<3; gx++) for(let gz=0; gz<3; gz++){
        if(rnd()<0.15) continue;
        house(cx0 + 22 + gx*18 + rnd()*4, cz0 + 22 + gz*18 + rnd()*4);
        if(rnd()<0.7) tree(cx0 + 16 + rnd()*48, cz0 + 16 + rnd()*48, false);
      }
    } else {
      /* bloc urbain : immeubles en périmètre, cour verte au centre */
      const yard = new THREE.Mesh(new THREE.PlaneGeometry(26,26), yardMat);
      yard.rotation.x = -Math.PI/2; yard.position.set(cx, 0.03, cz); cityGrp.add(yard);
      for(let i=0;i<2;i++) tree(cx + (rnd()-0.5)*18, cz + (rnd()-0.5)*18, false);
      const edges = [
        [cx - 20 - rnd()*2, cz - 26, 24+rnd()*10, 12],   // nord
        [cx + 20 + rnd()*2, cz + 26, 24+rnd()*10, 12],   // sud

function nodeIdx(x,z){ return ROAD_XZ.indexOf(x)*5 + ROAD_XZ.indexOf(z); }
function neighbors(i){
  const xi = (i/5|0), zi = i%5, out = [];
  if(xi>0) out.push(i-5); if(xi<4) out.push(i+5);
  if(zi>0) out.push(i-1); if(zi<4) out.push(i+1);
  return out;
}
function carReset(spd){
  const starts = [nodeIdx(-80,-80), nodeIdx(80,-80), nodeIdx(-80,80), nodeIdx(80,80), nodeIdx(0,0)];
  const s = starts[Math.random()*starts.length|0];
  car.pos.copy(NODES[s]); car.pos.y = 0.65;
  car.prev = -1; pickNext(s);
  car.spd = spd;
  car.head.visible = !isDay();
}
function pickNext(from){
  const opts = neighbors(from).filter(n => n !== car.prev);
  car.node = opts[Math.random()*opts.length|0] ?? neighbors(from)[0];
  car.prev = from;
}
function carUpdate(dt){
  const tgt = NODES[car.node];
  const dx = tgt.x - car.pos.x, dz = tgt.z - car.pos.z;
  if(Math.hypot(dx,dz) < 2){ pickNext(car.node); return; }
  const want = Math.atan2(dx,dz);
  let diff = want - car.heading;
  while(diff > Math.PI) diff -= 2*Math.PI; while(diff < -Math.PI) diff += 2*Math.PI;
  car.heading += THREE.MathUtils.clamp(diff, -2.2*dt, 2.2*dt);
  const slow = Math.abs(diff) > 0.4 ? 0.55 : 1;
  car.pos.x += Math.sin(car.heading)*car.spd*slow*dt;
  car.pos.z += Math.cos(car.heading)*car.spd*slow*dt;
  car.grp.position.copy(car.pos);
  car.grp.rotation.y = car.heading + Math.PI/2;
}

/* ================= circulation & piétons ================= */
const traffic = [];
const peds = [];
function mkCivCar(){
  const grp = new THREE.Group();
  const body = new THREE.Mesh(carGeoShared, new THREE.MeshLambertMaterial({color: CAR_COLORS[rnd()*CAR_COLORS.length|0]}));
  body.position.y = 0.75; grp.add(body);
  const cab = new THREE.Mesh(new THREE.BoxGeometry(2,0.7,1.7), new THREE.MeshLambertMaterial({color:0x1c2026}));
  cab.position.set(-0.1, 1.5, 0); grp.add(cab);
  if(!isDay()){
    const lg = new THREE.PlaneGeometry(0.3,0.2);
    for(const [lx,col] of [[-2.15,0xfff4d8],[2.15,0xff2626]]){
      for(const lz of [0.6,-0.6]){
        const l = new THREE.Mesh(lg, new THREE.MeshBasicMaterial({color:col}));
        l.position.set(lx, 0.7, lz); l.rotation.y = lx<0 ? -Math.PI/2 : Math.PI/2;
        grp.add(l);
      }
    }
  }
  cityGrp.add(grp);
  return grp;
}
function vehPick(v, from){
  const opts = neighbors(from).filter(n => n !== v.prev);
  v.node = opts[Math.random()*opts.length|0] ?? neighbors(from)[0];
  v.prev = from;
}
function vehStep(v, dt){
  const tgt = NODES[v.node];
  const dx = tgt.x - v.pos.x, dz = tgt.z - v.pos.z;
  if(Math.hypot(dx,dz) < 2){ vehPick(v, v.node); return; }
  const want = Math.atan2(dx,dz);
  let diff = want - v.heading;
  while(diff > Math.PI) diff -= 2*Math.PI; while(diff < -Math.PI) diff += 2*Math.PI;
  v.heading += THREE.MathUtils.clamp(diff, -2.2*dt, 2.2*dt);
  const slow = Math.abs(diff) > 0.4 ? 0.55 : 1;
  v.pos.x += Math.sin(v.heading)*v.spd*slow*dt;
  v.pos.z += Math.cos(v.heading)*v.spd*slow*dt;
  v.grp.position.copy(v.pos);
  v.grp.rotation.y = v.heading + Math.PI/2;
}
function spawnLife(){
  traffic.length = 0; peds.length = 0;
  for(let i=0;i<6;i++){
    const start = (rnd()*25)|0;
    const v = { grp: mkCivCar(), pos: NODES[start].clone(), prev:-1, node:0, heading: rnd()*6.28, spd: 8+rnd()*6 };
    v.pos.y = 0; vehPick(v, start);
    traffic.push(v);
  }
  const pgeo = new THREE.BoxGeometry(0.5,1.7,0.4);
  const pcols = [0x5a4a3a, 0x3a4a5a, 0x4a3a4a, 0x2f3f34, 0x6a5a40];
  for(let i=0;i<10;i++){
    const m = new THREE.Mesh(pgeo, new THREE.MeshLambertMaterial({color: pcols[i%5]}));
    const k = ROAD_XZ[rnd()*5|0];
    const onX = rnd()<0.5, off = rnd()<0.5? -7.6 : 7.6;
    const p = { m, onX, k: k+off, a: -140+rnd()*280, dir: rnd()<0.5? 1:-1, spd: 1+rnd()*0.8 };
    m.position.set(onX? p.k : p.a, 0.85, onX? p.a : p.k);
    cityGrp.add(m);
    peds.push(p);
  }
}
function lifeUpdate(dt){
  for(const v of traffic) vehStep(v, dt);
  for(const p of peds){
    p.a += p.dir*p.spd*dt;
    if(p.a > 148 || p.a < -148) p.dir *= -1;
    p.m.position.set(p.onX? p.k : p.a, 0.85, p.onX? p.a : p.k);
    p.m.rotation.y = p.onX ? (p.dir>0?0:Math.PI) : (p.dir>0? Math.PI/2 : -Math.PI/2);
  }
  /* collision drone / circulation (au ras du sol seulement) */
  if(S.flying && S.pos.y < 2.3 && S.vel.length() > 6){
    for(const v of traffic){
      if(Math.abs(v.pos.x-S.pos.x) < 2.6 && Math.abs(v.pos.z-S.pos.z) < 2.6){ fail('COLLISION VÉHICULE'); return; }
    }
  }
}

/* ================= drone : le vol suit la caméra ================= */
function lookDir(){
  return new THREE.Vector3(-Math.sin(S.yaw)*Math.cos(S.pitch), Math.sin(S.pitch), -Math.cos(S.yaw)*Math.cos(S.pitch));
}
function insideCollider(p){
  for(const c of colliders)
    if(p.x>c.min.x && p.x<c.max.x && p.y>c.min.y && p.y<c.max.y && p.z>c.min.z && p.z<c.max.z) return true;
  return false;
}
function respawn(def){
  if(def.type === 'chase'){
    S.pos.set(car.pos.x - Math.sin(car.heading)*30, 24, car.pos.z - Math.cos(car.heading)*30);
  } else if(def.type === 'race'){
    S.pos.copy(rings[0].pos).add(new THREE.Vector3(0, 2, 42));
  } else {
    S.pos.set(0, 26, 152);
  }
  while(insideCollider(S.pos)) S.pos.y += 8;
  S.vel.set(0,0,0);
  const aim = def.type === 'chase' ? car.pos
            : def.type === 'race' ? rings[0].pos
            : (photoTargets[0]?.pos || new THREE.Vector3(0,10,0));
  S.yaw = Math.atan2(-(aim.x - S.pos.x), -(aim.z - S.pos.z));
  S.pitch = -0.15;
  S.batt = 100; S.timer = def.time; S.lockT = 0; S.escapeT = 0; S.alarm = 0;
  S.zoom = 1; S.zoomT = 1; S.crashed = false; S.briefT = 7;
}
function physics(dt){
  /* avant = direction du regard (3D) : pique du nez = descend, cabre = monte */
  const f = lookDir();
  const r = new THREE.Vector3(Math.cos(S.yaw), 0, -Math.sin(S.yaw));
  const dir = new THREE.Vector3();
  if(keys['KeyW']) dir.add(f);
  if(keys['KeyS']) dir.sub(f);
  if(keys['KeyD']) dir.add(r);
  if(keys['KeyA']) dir.sub(r);
  if(dir.lengthSq()>0) dir.normalize();
  S.boost = !!keys['Space'] && S.batt > 0;
  const mul = (S.boost ? T.boostMul : 1) * EFF.spd;
  const tv = dir.multiplyScalar(T.maxSpd*mul);
  tv.y += ((keys['KeyQ'] ? T.maxUp : 0) + (keys['KeyE'] ? -T.maxUp : 0)) * EFF.spd;
  const k = Math.min(1, T.accel*dt/T.maxSpd*10);
  S.vel.x += (tv.x - S.vel.x)*k;
  S.vel.y += (tv.y - S.vel.y)*Math.min(1, k*1.2);
  S.vel.z += (tv.z - S.vel.z)*k;
  S.batt = Math.max(0, S.batt - dt*(T.battDrain + (S.boost? T.battBoost : 0))*EFF.drain);
  const step = S.vel.length()*dt;
  const n = THREE.MathUtils.clamp(Math.ceil(step/0.4), 1, 10);
  for(let i=0;i<n;i++){
    const nx = S.pos.x + S.vel.x*dt/n, ny = S.pos.y + S.vel.y*dt/n, nz = S.pos.z + S.vel.z*dt/n;
    const ground = ny < 0.5;
    const hit = ground || insideCollider(new THREE.Vector3(nx,ny,nz));
    if(hit){
      const lim = ground ? 12 : 9;
      if(S.vel.length() > lim){ fail('COLLISION STRUCTURE'); return; }
      S.vel.multiplyScalar(0.2); return;
    }
    S.pos.set(nx, Math.min(ny, 240), nz);
  }
}

/* ================= mission ================= */
function def(){ return DEFS[cur]; }
function missionUpdate(dt){
  const d = def();
  S.timer -= dt;
  S.photoCd = Math.max(0, S.photoCd - dt);
  if(photoMsgT > 0) photoMsgT -= dt;
  if(S.briefT > 0) S.briefT -= dt;

  for(const L of searchlights){
    L.ph += dt*L.spd;
    const tx = L.x + Math.sin(L.ph)*L.r, tz = L.z + Math.cos(L.ph*0.83)*L.r;
    L.tgt.position.set(tx, 0, tz);
    if(L.detect && S.flying){
      const src = new THREE.Vector3(L.x, L.h, L.z);
      const dirL = new THREE.Vector3(tx,0,tz).sub(src).normalize();
      const toD = S.pos.clone().sub(src);
      if(toD.length() < 120 && dirL.angleTo(toD.normalize()) < 0.34){
        S.alarm = Math.min(100, S.alarm + dt*T.alarmRise*(d.hard?2:1)*EFF.alarm);
      }
    }
  }
  if(searchlights.some(l=>l.detect)) S.alarm = Math.max(0, S.alarm - dt*T.alarmDecay*0.4);
  if(S.alarm >= 100){ fail('REPÉRÉ PAR LA SÉCURITÉ'); return; }

  if(d.type === 'chase'){
    const toCar = car.pos.clone().sub(S.pos);
    const dist = toCar.length();
    const ang = lookDir().angleTo(toCar.normalize());
    const locking = dist < T.lockDist && ang < T.lockAngle;
    const need = d.need + (d.endless ? endlessLvl*0.5 : 0);
    const escD = d.escape || 170;
    if(locking){
      S.lockT = Math.min(need, S.lockT + dt);
      beepT -= dt;
      if(beepT <= 0){ tone(760 + 520*(S.lockT/need), 0.06, 'square', 0.14); beepT = 0.42 - 0.3*(S.lockT/need); }
    }
    else S.lockT = Math.max(0, S.lockT - dt*0.8);
    S.escapeT = dist > escD ? S.escapeT + dt : 0;
    S._dist = dist; S._locking = locking; S._need = need; S._escD = escD;
    if(S.lockT >= need){
      if(d.endless){
        endlessLvl++; S.score += 800 + endlessLvl*200;
        snapFrame(`CIBLE ${endlessLvl}`); sfxRing();
        photoMsg = `CIBLE ${endlessLvl} IDENTIFIÉE — SUIVANTE ${(25+endlessLvl*2)*3.6|0} KM/H`; photoMsgT = 3;
        carReset(25 + endlessLvl*2); S.lockT = 0; S.timer = Math.min(d.time, S.timer + 35);
      } else { snapFrame('IDENTIFICATION'); win(); return; }
    }
    if(S.escapeT > T.escapeTime){ fail('CIBLE PERDUE'); return; }
  }
  if(d.type === 'race'){
    const r = rings[ringIdx];
    if(r){
      r.mesh.rotation.y += dt*1.5;
      const dd = S.pos.distanceTo(r.pos);
      S._dist = dd;
      if(dd < 5.5){
        r.mesh.material.color.setHex(0x33505c);
        ringIdx++;
        S.score += 150;
        sfxRing();
        photoMsg = `BALISE ${ringIdx}/${rings.length}`; photoMsgT = 1.4;
        if(ringIdx >= rings.length){ win(); return; }
      }
    }
  }
  if(S.timer <= 0){ fail(d.type==='race' ? 'CHRONO ÉCOULÉ' : 'TEMPS ÉCOULÉ'); return; }
  if(S.batt <= 0){
    S.vel.y = Math.min(S.vel.y, -6);
    if(S.pos.y < 2){ fail('BATTERIE À PLAT'); return; }
  }
}

  grab();
}
function fail(why){
  S.flying = false; document.exitPointerLock && document.exitPointerLock();
  sfxFail();
  document.getElementById('fail-why').textContent = why;
  document.getElementById('fail-stats').textContent = `OP. ${cur+1} · SCORE ${S.score} · RECORD ${S.best}`;
  scrFail.style.display = 'flex';
}
function win(){
  if(!S.flying) return;
  const d = def();
  const frac = Math.max(0, S.timer)/d.time;
  const nStars = d.endless ? (1 + (endlessLvl>=3) + (endlessLvl>=6))
                           : (1 + (frac > 0.25) + (frac > 0.5));
  if(nStars > (stars[cur]|0)){ stars[cur] = nStars; localStorage.setItem('ic-stars', JSON.stringify(stars)); }
  const gain = 250 + nStars*150 + endlessLvl*80;
  credits += gain; saveShop();
  const bonus = Math.round(Math.max(0,S.timer)*10);
  S.score += 1000 + bonus;
  if(S.score > S.best){ S.best = S.score; localStorage.setItem('ic-best', S.best); }
  if(cur >= prog){ prog = cur+1; localStorage.setItem('ic-prog', prog); }
  S.flying = false; document.exitPointerLock && document.exitPointerLock();
  sfxWin();
  document.getElementById('win-stars').innerHTML = starStr(nStars);
  const sb = document.getElementById('win-shots');
  sb.innerHTML = '';
  for(const s of shots.slice(-4)){
    const f = document.createElement('figure');
    f.innerHTML = `<img src="${s.url}"><figcaption>${s.label} — ${new Date().toLocaleDateString('fr-FR')}</figcaption>`;
    sb.appendChild(f);
  }
  document.getElementById('win-stats').textContent =
    `OP. ${cur+1} — ${d.title} · +${1000+bonus} PTS · +${gain} ◈ · SCORE ${S.score}`;
  document.getElementById('btn-next').style.display = cur+1 < DEFS.length ? '' : 'none';
  scrWin.style.display = 'flex';
}
function grab(){
  const p = document.body.requestPointerLock && document.body.requestPointerLock();
  if(p && p.catch) p.catch(()=>{});
}
const scrShop = document.getElementById('screen-shop');
document.getElementById('btn-go').onclick = e => { e.target.blur(); initAudio(); launch(); };
document.getElementById('btn-retry').onclick = e => { e.target.blur(); initAudio(); S.score = Math.max(0, S.score-200); launch(); };
document.getElementById('btn-next').onclick = e => { e.target.blur(); brief(Math.min(cur+1, DEFS.length-1)); scrWin.style.display='none'; };
document.getElementById('btn-menu1').onclick = e => { e.target.blur(); scrFail.style.display='none'; renderMenu(); scrStart.style.display='flex'; };
document.getElementById('btn-menu2').onclick = e => { e.target.blur(); scrWin.style.display='none'; renderMenu(); scrStart.style.display='flex'; };
document.getElementById('btn-shop').onclick = e => { e.target.blur(); initAudio(); scrStart.style.display='none'; renderShop(); scrShop.style.display='flex'; };
document.getElementById('btn-shop-back').onclick = e => { e.target.blur(); scrShop.style.display='none'; renderMenu(); scrStart.style.display='flex'; };
renderMenu();

/* ================= entrées ================= */
addEventListener('keydown', e => { keys[e.code] = true; if(e.code==='Space') e.preventDefault(); });
addEventListener('keyup', e => { keys[e.code] = false; });
addEventListener('mousemove', e => {
  if(!S.flying || !document.pointerLockElement) return;
  const sens = T.lookSens / S.zoom;
  S.yaw   -= e.movementX * sens;
  S.pitch = THREE.MathUtils.clamp(S.pitch - e.movementY*sens, -1.45, 1.45);
});
addEventListener('mousedown', e => {
  if(!S.flying) return;
  if(!document.pointerLockElement){ grab(); return; }
  if(e.button === 0) takePhoto();
});

/* ================= HUD ================= */
const hud = document.getElementById('hud');
const hctx = hud.getContext('2d');
function resize(){
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w,h); cam.aspect = w/h; cam.updateProjectionMatrix();
  hud.width = w; hud.height = h;
}
addEventListener('resize', resize); resize();

function marker(g, pos, label, color, w, h, cx, cy, distShow){
  const v = pos.clone(); v.y += 1.2;
  const pr = v.project(cam);
  const sx = (pr.x*0.5+0.5)*w, sy = (-pr.y*0.5+0.5)*h;
  const dist = pos.distanceTo(S.pos);
  const onScr = pr.z < 1 && sx > 0 && sx < w && sy > 0 && sy < h;
  if(onScr){
    const r = THREE.MathUtils.clamp(1400/Math.max(dist,6), 16, 64);
    g.strokeStyle = color; g.lineWidth = 2;
    g.strokeRect(sx-r, sy-r, r*2, r*2);
    g.fillStyle = color; g.textAlign = 'center'; g.font = '12px "Courier New",monospace';
    g.fillText(distShow ? `${label} · ${dist.toFixed(0)} m` : label, sx, sy + r + 16);
    return {sx, sy, r, dist, onScr};
  } else {
    const a = Math.atan2(sy-cy, sx-cx);
    const bx = cx + Math.cos(a)*(Math.min(w,h)*0.42), by = cy + Math.sin(a)*(Math.min(w,h)*0.42);
    g.save(); g.translate(bx,by); g.rotate(a);
    g.fillStyle = color;
    g.beginPath(); g.moveTo(14,0); g.lineTo(-8,-9); g.lineTo(-8,9); g.closePath(); g.fill();
    g.restore();
    g.fillStyle = color; g.textAlign = 'center'; g.font = '12px "Courier New",monospace';
    g.fillText(`${dist.toFixed(0)} m`, bx, by + 22);
    return {dist, onScr};
  }
}
function drawHUD(){
  const w = hud.width, h = hud.height, g = hctx;
  g.clearRect(0,0,w,h);
  if(!S.flying) return;
  const d = def();
  const CYN = '#8fd8ff', DIM = 'rgba(143,216,255,.6)', RED = '#ff7a6e', AMB = '#ffd27a';
  const cx = w/2, cy = h/2;
  g.textBaseline = 'middle';
  g.shadowColor = 'rgba(0,10,20,.85)'; g.shadowBlur = 4;   // lisible en plein jour

  g.strokeStyle = CYN; g.lineWidth = 1.2;
  g.beginPath();
  g.moveTo(cx-16,cy); g.lineTo(cx-5,cy); g.moveTo(cx+5,cy); g.lineTo(cx+16,cy);
  g.moveTo(cx,cy-14); g.lineTo(cx,cy-5); g.moveTo(cx,cy+5); g.lineTo(cx,cy+14);
  g.stroke();
  if(S.zoom > 1.05){
    g.strokeStyle = DIM;
    g.strokeRect(cx-w*0.24, cy-h*0.24, w*0.48, h*0.48);
    g.fillStyle = AMB; g.font = '13px "Courier New",monospace'; g.textAlign = 'left';
    g.fillText(`ZOOM ×${S.zoom.toFixed(1)}`, cx + w*0.24 + 10, cy - h*0.24);
  }
  g.strokeStyle = CYN; g.fillStyle = CYN;
  const spd = Math.round(S.vel.length()*3.6);
  g.font = 'bold 26px "Courier New",monospace'; g.textAlign = 'center';
  g.strokeRect(cx-260-52, cy-18, 104, 36); g.fillText(spd, cx-260, cy);
  g.strokeRect(cx+260-52, cy-18, 104, 36); g.fillText(S.pos.y.toFixed(0), cx+260, cy);
  g.font = '11px "Courier New",monospace'; g.fillStyle = DIM;
  g.fillText('KM/H', cx-260, cy-28); g.fillText('ALT M', cx+260, cy-28);

  g.textAlign = 'left'; g.fillStyle = CYN; g.font = '13px "Courier New",monospace';
  g.fillText(`OP. ${String(cur+1).padStart(2,'0')} — ${d.title}`, 24, 26);
  g.fillStyle = DIM;
  let objLine = '';
  if(d.type==='chase') objLine = d.endless ? `CIBLES IDENTIFIÉES : ${endlessLvl}` : `VERROUILLE LA CIBLE ${(S._need||d.need).toFixed(0)} s`;
  if(d.type==='photo' || d.type==='infil') objLine = `PHOTOS ${photoTargets.filter(t=>t.done).length}/${photoTargets.length}`;
  if(d.type==='race') objLine = `BALISES ${ringIdx}/${rings.length}`;
  g.fillText(objLine, 24, 46);
  if(S.briefT > 0){ g.fillStyle = AMB; g.fillText('► ' + d.obj, 24, 68); }

  g.textAlign = 'right';
  g.fillStyle = S.timer < 15 ? RED : CYN;
  g.font = 'bold 17px "Courier New",monospace';
  g.fillText(`T-${Math.max(0,S.timer).toFixed(0).padStart(3,'0')}`, w-24, 28);
  g.font = '13px "Courier New",monospace'; g.fillStyle = CYN;
  g.fillText(`SCORE ${S.score}`, w-24, 50);
  g.fillText(`RECORD ${S.best}`, w-24, 68);

  g.textAlign = 'left';
  g.fillStyle = S.batt < 25 ? RED : CYN;
  g.font = '13px "Courier New",monospace';
  g.fillText(`BAT ${S.batt.toFixed(0)}%`, 24, h-40);
  g.strokeStyle = g.fillStyle; g.strokeRect(24, h-30, 120, 10);
  g.fillRect(26, h-28, 116*(S.batt/100), 6);
  if(S.boost){ g.fillStyle = AMB; g.fillText('BOOST', 160, h-40); }

  if(searchlights.some(l=>l.detect)){
    g.textAlign = 'right';
    g.fillStyle = S.alarm > 55 ? RED : DIM;
    g.fillText(`ALERTE ${S.alarm.toFixed(0)}%`, w-24, h-40);
    g.strokeStyle = g.fillStyle; g.strokeRect(w-144, h-30, 120, 10);
    g.fillRect(w-142, h-28, 116*(S.alarm/100), 6);
    if(S.alarm > 55){
      g.fillStyle = `rgba(255,60,40,${0.08 + 0.08*Math.sin(performance.now()/120)})`;
      g.fillRect(0,0,w,h);
    }
  }

  if(d.type === 'chase'){
    const need = S._need || d.need;
    const mk = marker(g, car.pos, 'CIBLE', S._locking ? AMB : (S._dist > (S._escD||170) ? RED : CYN), w, h, cx, cy, true);
    if(mk.onScr){
      g.beginPath();
      g.arc(mk.sx, mk.sy, mk.r+10, -Math.PI/2, -Math.PI/2 + 2*Math.PI*(S.lockT/need));
      g.strokeStyle = AMB; g.lineWidth = 3.5; g.stroke();
      if(S._locking){
        g.fillStyle = AMB; g.textAlign='center'; g.font='bold 14px "Courier New",monospace';
        g.fillText(`SCAN ${(S.lockT/need*100).toFixed(0)}%`, mk.sx, mk.sy - mk.r - 16);
      }
    }
    if(S.escapeT > 0){
      g.fillStyle = RED; g.textAlign='center'; g.font='bold 17px "Courier New",monospace';
      g.fillText(`⚠ SIGNAL FAIBLE — ELLE TE SÈME ${(T.escapeTime-S.escapeT).toFixed(1)} s`, cx, cy-120);
    }
  }
  if(d.type === 'photo' || d.type === 'infil'){
    for(const t of photoTargets)
      if(!t.done) marker(g, t.pos, t.label + (t.needZoom? ' [ZOOM]':''), CYN, w, h, cx, cy, true);
  }
  if(d.type === 'race' && rings[ringIdx])
    marker(g, rings[ringIdx].pos, `BALISE ${ringIdx+1}`, '#27e8ff', w, h, cx, cy, true);

  if(photoMsgT > 0){
    g.fillStyle = photoMsg.includes('VALIDÉ') || photoMsg.includes('IDENTIFIÉE') || photoMsg.includes('BALISE') ? AMB : RED;
    g.textAlign = 'center'; g.font = 'bold 16px "Courier New",monospace';
    g.fillText(photoMsg, cx, h - 110);
  }
  if(S.batt <= 0){
    g.fillStyle = RED; g.textAlign='center'; g.font='bold 17px "Courier New",monospace';
    g.fillText('⚠ BATTERIE VIDE — MOTEURS COUPÉS', cx, cy-148);
  }
  g.shadowBlur = 0;
}

/* ================= boucle ================= */
const clock = new THREE.Clock();
function loop(){
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = performance.now()/1000;
  for(const b of blinkers) b.mat.visible = Math.sin(t*3.4 + b.ph) > 0;
  if(S.flying && !S.crashed){
    physics(dt);
    if(S.flying){
      if(def().type === 'chase') carUpdate(dt);
      lifeUpdate(dt);
      if(S.flying) missionUpdate(dt);
    }
  }
  updateAudio(dt);
  S.zoom += (S.zoomT - S.zoom)*Math.min(1, 10*dt);
  cam.fov = 78 / S.zoom; cam.updateProjectionMatrix();
  cam.position.copy(S.pos);
  cam.rotation.set(0,0,0);
  cam.rotateY(S.yaw); cam.rotateX(S.pitch);
  const bank = THREE.MathUtils.clamp(-S.vel.dot(new THREE.Vector3(Math.cos(S.yaw),0,-Math.sin(S.yaw)))*0.006, -0.18, 0.18);
  cam.rotateZ(bank);
  renderer.render(scene, cam);
  drawHUD();
}
loop();

/* ================= hooks de test ================= */
window.__chase = { state: S, keys, T, car, NODES, EFF, DRONES, MODS,
  get colliders(){ return colliders; },
  get photoTargets(){ return photoTargets; },
  get rings(){ return rings; }, get ringIdx(){ return ringIdx; },
  get searchlights(){ return searchlights; }, get tod(){ return tod; },
  get traffic(){ return traffic; }, get peds(){ return peds; },
  get shots(){ return shots; }, get credits(){ return credits; },
  get shopState(){ return shopState; }, get stars(){ return stars; },
  addCredits: n => { credits += n; saveShop(); },
  DEFS, get cur(){ return cur; }, get prog(){ return prog; },
  brief, launch, launchMission: i => { cur = i; launch(); },
  takePhoto, respawn, fail, win, applyTod, renderShop,
  setLook: (y,p) => { S.yaw = y; S.pitch = p; },
  setZoom: z => { S.zoomT = z; S.zoom = z; },
  cam, scene, THREE };
</script>
