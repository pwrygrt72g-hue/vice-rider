<script type="module">

  { type:'chase', title:'SANS LIMITE', ty:'FILATURE ∞', tod:'dusk',

let prog = +(localStorage.getItem('ic-prog') || 0);
let cur = 0;
let endlessLvl = 0;

/* ================= hangar : drones & crédits ================= */
const DRONES = [
  { id:'vector', name:'VECTOR', ty:'STANDARD', price:0,

    spd:1.2, drain:1.1, alarm:1, see:1, boostDrain:0.65, hp:0 },
];
const MODS = [
  { id:'zoom4', name:'OPTIQUE ×4', ty:'MODULE', price:1200,
    desc:"Le double-clic enchaîne ×2 puis ×4 : photographie sans t'approcher des faisceaux." },
  { id:'emp2', name:'CONDENSATEUR IEM', ty:'MODULE', price:1800,
    desc:"Une 3e charge IEM par mission. Un intercepteur au sol, c'est 9 secondes de tranquillité." },
  { id:'plating', name:'BLINDAGE COMPOSITE', ty:'MODULE', price:1600,
    desc:"+30 d'intégrité, cumulable avec l'ATLAS. Survivre à un impact de plus change une mission." },

let shopState = { owned:['vector'], cur:'vector', mods:[] };
try{ shopState = Object.assign(shopState, JSON.parse(localStorage.getItem('ic-shop')||'{}')); }catch(e){}
let credits = +(localStorage.getItem('ic-credits') || 0);
let stars = [];
try{ stars = JSON.parse(localStorage.getItem('ic-stars')||'[]'); }catch(e){}
const EFF = { spd:1, drain:1, alarm:1, see:1, boostDrain:1, zoomMax:2, hpMax:100, empMax:2 };
function applyEff(){
  const d = DRONES.find(x=>x.id===shopState.cur) || DRONES[0];
  EFF.spd = d.spd; EFF.drain = d.drain; EFF.alarm = d.alarm;
  EFF.see = d.see; EFF.boostDrain = d.boostDrain;
  EFF.zoomMax = shopState.mods.includes('zoom4') ? 4 : 2;
  EFF.hpMax = 100 + d.hp + (shopState.mods.includes('plating') ? 30 : 0);
  EFF.empMax = 2 + (shopState.mods.includes('emp2') ? 1 : 0);
}
function saveShop(){
  localStorage.setItem('ic-shop', JSON.stringify(shopState));
  localStorage.setItem('ic-credits', credits);
}

/* ================= audio (WebAudio, zéro fichier) ================= */
const AU = { ctx:null };
function initAudio(){
  if(AU.ctx){ AU.ctx.resume && AU.ctx.resume(); return; }
  const C = AU.ctx = new (window.AudioContext || window.webkitAudioContext)();
  AU.master = C.createGain(); AU.master.gain.value = 0.5; AU.master.connect(C.destination);
  /* moteurs : 2 dents de scie désaccordées + passe-bas */
  const lp = C.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 850;
  AU.mGain = C.createGain(); AU.mGain.gain.value = 0;
  AU.o1 = C.createOscillator(); AU.o1.type = 'sawtooth'; AU.o1.frequency.value = 90;
  AU.o2 = C.createOscillator(); AU.o2.type = 'sawtooth'; AU.o2.frequency.value = 92;
  AU.o1.connect(lp); AU.o2.connect(lp); lp.connect(AU.mGain); AU.mGain.connect(AU.master);
  AU.o1.start(); AU.o2.start();
  /* vent : bruit blanc en passe-bande */
  const buf = C.createBuffer(1, C.sampleRate*2, C.sampleRate);
  const dd = buf.getChannelData(0);
  for(let i=0;i<dd.length;i++) dd[i] = Math.random()*2-1;
  const wind = C.createBufferSource(); wind.buffer = buf; wind.loop = true;
  const bp = C.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 500; bp.Q.value = 0.5;
  AU.wGain = C.createGain(); AU.wGain.gain.value = 0;
  wind.connect(bp); bp.connect(AU.wGain); AU.wGain.connect(AU.master);
  wind.start();
  /* alarme : triangle modulé */
  AU.aOsc = C.createOscillator(); AU.aOsc.type = 'triangle'; AU.aOsc.frequency.value = 600;
  AU.aGain = C.createGain(); AU.aGain.gain.value = 0;
  AU.aOsc.connect(AU.aGain); AU.aGain.connect(AU.master);
  AU.aOsc.start();
  /* menace : bourdon grave des intercepteurs proches */
  AU.hOsc = C.createOscillator(); AU.hOsc.type = 'sawtooth'; AU.hOsc.frequency.value = 210;
  AU.hGain = C.createGain(); AU.hGain.gain.value = 0;
  const hf = C.createBiquadFilter(); hf.type = 'lowpass'; hf.frequency.value = 420;
  AU.hOsc.connect(hf); hf.connect(AU.hGain); AU.hGain.connect(AU.master);
  AU.hOsc.start();
}
function tone(f, dur, type='sine', vol=0.22, slideTo){
  if(!AU.ctx) return;
  const C = AU.ctx, o = C.createOscillator(), g = C.createGain();
  o.type = type; o.frequency.setValueAtTime(f, C.currentTime);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, C.currentTime+dur);
  g.gain.setValueAtTime(vol, C.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, C.currentTime+dur);
  o.connect(g); g.connect(AU.master);
  o.start(); o.stop(C.currentTime+dur+0.02);
}
function sfxShutter(){
  tone(1700, 0.05, 'square', 0.18);
  if(!AU.ctx) return;
  const C = AU.ctx, b = C.createBuffer(1, C.sampleRate*0.07|0, C.sampleRate);
  const dd = b.getChannelData(0);
  for(let i=0;i<dd.length;i++) dd[i] = (Math.random()*2-1)*(1-i/dd.length);
  const s = C.createBufferSource(); s.buffer = b;
  const g = C.createGain(); g.gain.value = 0.28;
  s.connect(g); g.connect(AU.master); s.start();
}
function sfxRing(){ tone(880, 0.16, 'sine', 0.3, 1320); tone(1760, 0.12, 'sine', 0.12); }
function sfxWin(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'triangle',0.25), i*110)); }
function sfxFail(){ tone(320, 0.6, 'sawtooth', 0.2, 110); }
function sfxBuy(){ tone(700,0.08,'square',0.2); setTimeout(()=>tone(1050,0.12,'square',0.2), 70); }
function updateAudio(dt){
  if(!AU.ctx) return;
  const spd = S.vel.length();
  const fly = S.flying ? 1 : 0;
  const mT = fly ? 0.09 + (spd/(T.maxSpd*EFF.spd))*0.13 + (S.boost?0.07:0) : 0;
  AU.mGain.gain.value += (mT - AU.mGain.gain.value)*Math.min(1, 8*dt);
  const base = 78 + spd*2.3 + (S.boost? 28:0);
  AU.o1.frequency.value = base; AU.o2.frequency.value = base*1.022;
  const wT = fly ? Math.min(0.42, (spd/(T.maxSpd*EFF.spd))**2*0.38) : 0;
  AU.wGain.gain.value += (wT - AU.wGain.gain.value)*Math.min(1, 6*dt);
  const a = S.flying ? S.alarm/100 : 0;
  AU.aGain.gain.value = a > 0.02 ? 0.04 + a*0.11 : 0;
  if(a > 0.02) AU.aOsc.frequency.value = 480 + 280*(0.5+0.5*Math.sin(performance.now()/110));
  /* cœur qui bat : chassé, repéré ou blessé */
  const chased = hunters.some(x=>x.state==='chase');
  const menace = S.flying ? Math.max(chased?0.65:0, a*0.9, S.hp < 35 ? 0.55 : 0) : 0;
  if(menace > 0.2){
    AU.beatT = (AU.beatT||0) - dt;
    if(AU.beatT <= 0){
      AU.beatT = 1.05 - menace*0.6;
      tone(58, 0.15, 'sine', 0.5);
      setTimeout(()=>tone(50, 0.1, 'sine', 0.3), 120);
    }
  }
  /* batterie faible */
  if(S.flying && S.batt < 20 && S.batt > 0){
    AU.battT = (AU.battT||0) - dt;
    if(AU.battT <= 0){ AU.battT = 2.2; tone(920, 0.09, 'square', 0.14); tone(920, 0.09, 'square', 0.14); }
  }
}

/* ================= état ================= */
const S = {

  flying: false, crashed: false,
  batt: 100, timer: 100, hp: 100, shakeT: 0, emp: 2, empCd: 0,

  zoom: 1, zoomT: 1, photoCd: 0,
  score: 0, best: +(localStorage.getItem('ic-best')||0),
  boost: false, briefT: 0,
};
const keys = {};

/* ================= scène & éclairages par heure ================= */
const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('c3d'), antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a0e16, 60, 430);
const cam = new THREE.PerspectiveCamera(78, 1, 0.1, 1500);

const sun = new THREE.DirectionalLight(0xffe8c8, 2.2); sun.position.set(-160, 190, 90); scene.add(sun);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
Object.assign(sun.shadow.camera, {left:-480, right:480, top:480, bottom:-480, near:40, far:900});
sun.shadow.bias = -0.0006;
scene.add(sun.target);
const hemi = new THREE.HemisphereLight(0xbdd7f0, 0x8a8578, 1.0); scene.add(hemi);
const amb = new THREE.AmbientLight(0x2a2018, 0.4); scene.add(amb);

const TOD = {
  day:  { fog:0xb9c8d2, near:120, far:760, sunC:0xfff2dd, sunI:2.6, sunPos:[120,220,60],
          hemiS:0xbdd7f0, hemiG:0x8a8578, hemiI:1.05, ambI:0.25, expo:1.05,
          top:[0.42,0.62,0.85], mid:[0.66,0.78,0.90], low:[0.82,0.87,0.92], stars:0 },
  dusk: { fog:0x9c8496, near:90, far:600, sunC:0xffa562, sunI:1.9, sunPos:[-220,60,140],
          hemiS:0x8878a0, hemiG:0x54483e, hemiI:0.8, ambI:0.4, expo:1.0,
          top:[0.16,0.20,0.38], mid:[0.72,0.45,0.38], low:[0.95,0.66,0.38], stars:0.3 },
  night:{ fog:0x0a0e16, near:60, far:430, sunC:0x8fb4ff, sunI:0.85, sunPos:[-160,190,90],
          hemiS:0x1c2a44, hemiG:0x05060a, hemiI:0.7, ambI:0.5, expo:1.18,

const PARIS = await fetch('./paris.json').then(r => r.json());
/* graphe routier réel pour les véhicules */
const graph = { pts: [], adj: [] };
{
  const key2i = new Map();
  const nid = (x,z) => {
    const k = Math.round(x/2) + '_' + Math.round(z/2);
    let i = key2i.get(k);
    if(i === undefined){ i = graph.pts.length; key2i.set(k,i);
      graph.pts.push(new THREE.Vector3(x,0,z)); graph.adj.push([]); }
    return i;
  };
  for(const r of PARIS.r){
    if(!r.d) continue;
    let prev = null;
    for(let i=0;i<r.p.length;i+=2){
      const id = nid(r.p[i], r.p[i+1]);
      if(prev !== null && prev !== id){
        if(!graph.adj[prev].includes(id)) graph.adj[prev].push(id);
        if(!graph.adj[id].includes(prev)) graph.adj[id].push(prev);
      }
      prev = id;
    }
  }
}
function nearestNode(x,z){
  let bi = 0, bd = 1e12;
  for(let i=0;i<graph.pts.length;i++){
    if(!graph.adj[i].length) continue;
    const p = graph.pts[i], d = (p.x-x)**2 + (p.z-z)**2;
    if(d < bd){ bd = d; bi = i; }
  }
  return bi;
}

function hausTex(pal){
  const c = document.createElement('canvas'); c.width = c.height = 512;
  const g = c.getContext('2d');
  g.fillStyle = pal.wall; g.fillRect(0,0,512,512);
  g.strokeStyle = 'rgba(0,0,0,.07)'; g.lineWidth = 1;           // joints de pierre
  for(let y=0;y<512;y+=16){ g.beginPath(); g.moveTo(0,y); g.lineTo(512,y); g.stroke(); }
  g.fillStyle = 'rgba(255,255,255,.12)';                         // bandeaux d'étage
  for(let f=0;f<4;f++) g.fillRect(0, f*128, 512, 5);
  for(let f=0;f<4;f++) for(let wq=0; wq<4; wq++){
    const wx = wq*128+36, wy = f*128+18, ww = 56, wh = 88;
    const lit = !isDay() && rnd() < (tod==='dusk' ? 0.18 : 0.38);
    const gr = g.createLinearGradient(0,wy,0,wy+wh);
    if(lit){ gr.addColorStop(0,'#ffd9a0'); gr.addColorStop(1,'#c98f4e'); }
    else if(isDay()){ gr.addColorStop(0,'#a9bfd2'); gr.addColorStop(1,'#5f7488'); }
    else { gr.addColorStop(0,'#1a2028'); gr.addColorStop(1,'#0c1016'); }
    g.fillStyle = gr; g.fillRect(wx,wy,ww,wh);                   // vitre
    g.strokeStyle = pal.trim; g.lineWidth = 5;                   // encadrement pierre
    g.strokeRect(wx-4, wy-4, ww+8, wh+8);
    g.strokeStyle = lit ? 'rgba(70,40,16,.8)' : 'rgba(232,228,214,.9)';
    g.lineWidth = 3;                                             // croisillons
    g.beginPath(); g.moveTo(wx+ww/2,wy); g.lineTo(wx+ww/2,wy+wh);
    g.moveTo(wx,wy+wh*0.45); g.lineTo(wx+ww,wy+wh*0.45); g.stroke();
    g.strokeRect(wx,wy,ww,wh);
    g.strokeStyle = 'rgba(28,30,34,.85)'; g.lineWidth = 2;       // balcon fer forgé
    g.strokeRect(wx-7, wy+wh-13, ww+14, 13);
    for(let bx=wx-7; bx<=wx+ww+7; bx+=6){ g.beginPath(); g.moveTo(bx,wy+wh-13); g.lineTo(bx,wy+wh); g.stroke(); }
  }

}

function buildParisBuildings(){
  const wallBuckets = PALETTES.map(()=>[]);
  const shopBucket = [];
  const roofBuckets = [[],[]];
  const SHOP_H = 3.8, MOD_W = 12.8, MOD_H = 12.4;
  PARIS.b.forEach((b, bi) => {
    const p = b.p, h = b.h;
    let minx=1e9, maxx=-1e9, minz=1e9, maxz=-1e9, cx=0, cz=0;
    const n = p.length/2;
    for(let i=0;i<p.length;i+=2){
      minx = Math.min(minx,p[i]); maxx = Math.max(maxx,p[i]);
      minz = Math.min(minz,p[i+1]); maxz = Math.max(maxz,p[i+1]);
      cx += p[i]/n; cz += p[i+1]/n;
    }
    colliders.push({min: new THREE.Vector3(minx-0.4,0,minz-0.4), max: new THREE.Vector3(maxx+0.4,h+0.4,maxz+0.4), poly: p});
    built.push({x:cx, z:cz, h});
    const pal = bi % PALETTES.length;
    const shopH = h > 8 ? SHOP_H : 0;
    for(let i=0;i<p.length;i+=2){
      const ax = p[i], az = p[i+1];
      const bx2 = p[(i+2)%p.length], bz2 = p[(i+3)%p.length];
      const dx = bx2-ax, dz = bz2-az, len = Math.hypot(dx,dz);
      if(len < 1.5) continue;
      const a = Math.atan2(-dz, dx);
      const mx = (ax+bx2)/2, mz = (az+bz2)/2;
      const wallH = h - shopH;
      const gw = new THREE.PlaneGeometry(len, wallH);
      const uvw = gw.attributes.uv;
      for(let k=0;k<uvw.count;k++){ uvw.setXY(k, uvw.getX(k)*(len/MOD_W), uvw.getY(k)*(wallH/MOD_H)); }
      gw.rotateY(a); gw.translate(mx, shopH + wallH/2, mz);
      wallBuckets[pal].push(gw);
      if(shopH > 0){
        const gs = new THREE.PlaneGeometry(len, shopH);
        const uvs = gs.attributes.uv;
        for(let k=0;k<uvs.count;k++) uvs.setX(k, uvs.getX(k)*(len/18.4));
        gs.rotateY(a); gs.translate(mx, shopH/2, mz);
        shopBucket.push(gs);
      }
    }
    /* toit plat zinc (empreinte réelle) */
    const shape = new THREE.Shape();
    shape.moveTo(p[0], -p[1]);
    for(let i=2;i<p.length;i+=2) shape.lineTo(p[i], -p[i+1]);
    shape.closePath();
    const gr = new THREE.ShapeGeometry(shape);
    gr.rotateX(-Math.PI/2); gr.translate(0, h, 0);
    roofBuckets[bi%2].push(gr);
  });
  const mkMat = (tex, emissive) => {
    const m = new THREE.MeshLambertMaterial({map: tex, side: THREE.DoubleSide});
    if(emissive && !isDay()){ m.emissive = new THREE.Color(0xffffff); m.emissiveMap = tex;
      m.emissiveIntensity = tod==='dusk' ? 0.32 : 0.62; }
    return m;
  };
  wallBuckets.forEach((arr, i) => {
    if(!arr.length) return;
    const m = new THREE.Mesh(mergeGeometries(arr), mkMat(hausTex(PALETTES[i]), true));
    m.castShadow = m.receiveShadow = true;
    cityGrp.add(m);
  });
  if(shopBucket.length){
    const m = new THREE.Mesh(mergeGeometries(shopBucket), mkMat(shopTex(), true));
    m.receiveShadow = true;
    cityGrp.add(m);
  }
  roofBuckets.forEach((arr, i) => {
    if(!arr.length) return;
    const m = new THREE.Mesh(mergeGeometries(arr), new THREE.MeshLambertMaterial({map: roofTex(i===1)}));
    m.castShadow = m.receiveShadow = true;
    cityGrp.add(m);
  });
  /* feux rouges sur les 6 plus hauts toits, la nuit */
  if(!isDay()){
    [...built].sort((a,b)=>b.h-a.h).slice(0,6).forEach(b => blinker(b.x, b.h+1.6, b.z));
  }
}

function pip(poly, x, z){
  let inside = false;
  for(let i=0, j=poly.length-2; i<poly.length; j=i, i+=2){
    const xi = poly[i], zi = poly[i+1], xj = poly[j], zj = poly[j+1];
    if((zi > z) !== (zj > z) && x < (xj-xi)*(z-zi)/(zj-zi) + xi) inside = !inside;
  }
  return inside;
}

function buildWorld(def){
  if(cityGrp) scene.remove(cityGrp);

  for(const s of SEG){
    if(!s.d) continue;
    const nLamp = Math.floor(s.len/34);
    for(let i=1;i<=nLamp;i++){
      const t = i/(nLamp+1), side = (i%2? 1 : -1);
      lamp(s.ax + (s.bx-s.ax)*t + s.nx*side*(s.w/2+1.6),
           s.az + (s.bz-s.az)*t + s.nz*side*(s.w/2+1.6));
    }
  }
  let parked = 0;
  for(let tries=0; parked<34 && tries<200; tries++){
    const s = SEG[(rnd()*SEG.length)|0];
    if(!s.d || s.len < 14) continue;
    const t = 0.15 + rnd()*0.7, side = rnd()<0.5? 1 : -1;
    const x = s.ax + (s.bx-s.ax)*t + s.nx*side*(s.w/2-1.3);
    const z = s.az + (s.bz-s.az)*t + s.nz*side*(s.w/2-1.3);
    if(insideCollider(new THREE.Vector3(x,1,z))) continue;
    parkedCar(x, z, Math.atan2(s.bx-s.ax, s.bz-s.az) + Math.PI/2 + (rnd()-0.5)*0.05);
    parked++;
  }
  let trees = 0;
  for(let tries=0; trees<26 && tries<220; tries++){
    const s = SEG[(rnd()*SEG.length)|0];
    if(s.w < 10 || s.len < 20) continue;
    const t = 0.1 + rnd()*0.8, side = rnd()<0.5? 1 : -1;
    const x = s.ax + (s.bx-s.ax)*t + s.nx*side*(s.w/2+3);

    if(insideCollider(new THREE.Vector3(x,2,z))) continue;
    tree(x, z, rnd()<0.3);
    trees++;
  }

  /* objectifs sur les vrais lieux */
  const POI = PARIS.poi;
  if(def.type === 'infil'){
    const [wx, wz] = POI.marche;   // marché Saint-Honoré
    warehouse(wx, wz, def.hard ? 'SERVEURS' : "CAISSES D'ARMES");
    searchlight(wx - 14, wz - 26, 14, true, def.hard ? 0.85 : 0.55);
    if((def.lights||0) > 1) searchlight(wx + 16, wz - 22, 14, true, 0.7);
  }
  if(def.meeting){
    const [mx, mz] = POI.vendome;  // place Vendôme
    for(const [ox,oz,c] of [[-4,-2,0x14161c],[4,-1,0x23262e]]){
      const cm = new THREE.Mesh(carGeoShared, new THREE.MeshLambertMaterial({color:c}));
      cm.position.set(mx+ox, 0.75, mz+oz); cm.rotation.y = rnd(); cityGrp.add(cm);
      addCollider(mx+ox, mz+oz, 4.6, 4.6, 1.6);
    }
    for(let i=0;i<4;i++){
      const p = new THREE.Mesh(new THREE.BoxGeometry(0.55,1.7,0.4), new THREE.MeshLambertMaterial({color:0x0e1014}));
      p.position.set(mx + Math.sin(i*1.7)*1.8, 0.85, mz + Math.cos(i*1.7)*1.8); cityGrp.add(p);
    }
    const gl = new THREE.Sprite(new THREE.SpriteMaterial({map: glowTex, color:0xffd9a0, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true}));
    gl.scale.set(10,10,1); gl.position.set(mx, 4, mz); cityGrp.add(gl);
    photoTargets.push({pos: new THREE.Vector3(mx, 1.2, mz), label:'LA RÉUNION', done:false, range:60, needZoom:true});
    searchlight(mx-20, mz-16, 13, true, 0.5);
    if((def.lights||0) > 1) searchlight(mx+20, mz+14, 13, true, 0.65);
    if((def.lights||0) > 2) searchlight(mx, mz-26, 13, true, 0.75);
  }
  if(def.type === 'photo' && !def.meeting){
    /* antennes dans le périmètre d'opération (autour de l'Opéra) */
    const [ox, oz] = PARIS.poi.opera;
    const zr = (def.zr || 260)*0.8;
    const near = built.filter(b => Math.hypot(b.x-ox, b.z-oz) < zr);
    const tall = near.sort((a,b)=>b.h-a.h).slice(0,10);
    for(let i=0;i<3 && tall.length;i++){
      const b = tall[(i*3+1) % tall.length];
      photoTargets.push({pos: antenna(b.x, b.z, b.h), label: `ANTENNE ${'ABC'[i]}`, done:false, range:65, needZoom:false});
    }
  }
  if(def.type === 'race'){
    /* itinéraire réel : marche aléatoire sur le graphe depuis l'Opéra */
    let cur2 = nearestNode(POI.opera[0], POI.opera[1]);
    let lastPos = graph.pts[cur2];
    const seen = new Set([cur2]);
    ring(lastPos.x, 6, lastPos.z);
    let guard = 0;
    const nRings = def.rings || 12;
    while(rings.length < nRings && guard++ < 700){
      const opts = graph.adj[cur2].filter(n => !seen.has(n));
      cur2 = (opts.length ? opts : graph.adj[cur2])[(rnd()*(opts.length||graph.adj[cur2].length))|0];
      seen.add(cur2);
      const p = graph.pts[cur2];
      if(p.distanceTo(lastPos) > 55){
        const i = rings.length;
        ring(p.x, 5 + (i%4)*6 + (i>7? 7:0), p.z);
        lastPos = p;
      }
    }
  }
  /* intercepteurs de patrouille */
  const nHunt = def.hunt || 0;
  for(let i=0;i<nHunt;i++){
    /* postés autour des objectifs, sinon au centre */
    let hx = 0, hz = 0;
    if(photoTargets.length){ const t = photoTargets[i % photoTargets.length];
      hx = t.pos.x + (rnd()*60-30); hz = t.pos.z + (rnd()*60-30); }
    else if(rings.length){ const r = rings[(i*4+2) % rings.length];
      hx = r.pos.x + (rnd()*40-20); hz = r.pos.z + (rnd()*40-20); }
    else { hx = rnd()*300-150; hz = rnd()*300-150; }
    mkHunter(hx, 16 + rnd()*14, hz);
  }
  /* spawnLife() est appelé par launch() une fois la zone d'opération fixée */
}

const traffic = [];
const peds = [];
function mkCivCar(){
  const grp = new THREE.Group();
  const body = new THREE.Mesh(carGeoShared, new THREE.MeshLambertMaterial({color: CAR_COLORS[rnd()*CAR_COLORS.length|0]}));
  body.position.y = 0.75; grp.add(body);

      for(const lz of [0.6,-0.6]){
        const l = new THREE.Mesh(lg, new THREE.MeshBasicMaterial({color:col}));
        l.position.set(lx, 0.7, lz); l.rotation.y = lx<0 ? -Math.PI/2 : Math.PI/2;
        grp.add(l);
      }
    }
  }
  cityGrp.add(grp);
  return grp;
}
function vehPick(v, from){
  const adj = graph.adj[from] || [];
  let opts = adj.filter(n => n !== v.prev);
  /* reste dans le périmètre d'opération (l'action ne se disperse pas) */
  const zoned = opts.filter(n => inZone(graph.pts[n].x, graph.pts[n].z));
  if(zoned.length) opts = zoned;
  v.node = (opts.length ? opts : adj)[Math.random()*(opts.length||adj.length)|0] ?? from;
  v.prev = from;
}
function vehStep(v, dt){
  const tgt = graph.pts[v.node];
  if(!tgt) return;
  const dx = tgt.x - v.pos.x, dz = tgt.z - v.pos.z;
  if(Math.hypot(dx,dz) < 2){ vehPick(v, v.node); return; }
  const want = Math.atan2(dx,dz);
  let diff = want - v.heading;
  while(diff > Math.PI) diff -= 2*Math.PI; while(diff < -Math.PI) diff += 2*Math.PI;
  v.heading += THREE.MathUtils.clamp(diff, -2.2*dt, 2.2*dt);
  const slow = Math.abs(diff) > 0.4 ? 0.55 : 1;
  v.pos.x += Math.sin(v.heading)*v.spd*slow*dt;
  v.pos.z += Math.cos(v.heading)*v.spd*slow*dt;
  v.grp.position.copy(v.pos);
  v.grp.rotation.y = v.heading + Math.PI/2;
}
function mkBus(){
  const grp = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(9.6,2.6,2.4),

      for(const lz of [0.7,-0.7]){
        const l = new THREE.Mesh(lg, new THREE.MeshBasicMaterial({color:col}));
        l.position.set(lx, 0.8, lz); l.rotation.y = lx<0 ? -Math.PI/2 : Math.PI/2;

      }
    }

  cityGrp.add(grp);
  return grp;
}
function spawnLife(){
  traffic.length = 0; peds.length = 0;
  /* toute la vie se concentre dans le périmètre d'opération */
  const zNodes = [];
  for(let i=0;i<graph.pts.length;i++)
    if(graph.adj[i].length && inZone(graph.pts[i].x, graph.pts[i].z)) zNodes.push(i);
  for(let i=0;i<36 && zNodes.length;i++){
    const start = zNodes[(rnd()*zNodes.length)|0];
    const bus = i%7===0;
    const v = { grp: bus ? mkBus() : mkCivCar(), pos: graph.pts[start].clone(), prev:-1, node:0,
      heading: rnd()*6.28, spd: bus ? 7+rnd()*3 : 9+rnd()*7, r: bus ? 5.2 : 2.6 };
    v.pos.y = 0; vehPick(v, start);
    traffic.push(v);
  }
  const pgeo = new THREE.BoxGeometry(0.5,1.7,0.4);
  const pcols = [0x5a4a3a, 0x3a4a5a, 0x4a3a4a, 0x2f3f34, 0x6a5a40];
  for(let tries=0; peds.length<14 && tries<160; tries++){
    const s = SEG[(rnd()*SEG.length)|0];
    if(s.len < 20 || !inZone((s.ax+s.bx)/2, (s.az+s.bz)/2)) continue;
    const m = new THREE.Mesh(pgeo, new THREE.MeshLambertMaterial({color: pcols[peds.length%5]}));
    const side = rnd()<0.5? 1 : -1;
    const p = { m, s, side, t: rnd(), dir: rnd()<0.5? 1:-1, spd: (1+rnd()*0.8)/s.len };
    cityGrp.add(m);
    peds.push(p);
  }
}
function lifeUpdate(dt){
  for(const v of traffic) vehStep(v, dt);
  for(const p of peds){
    p.t += p.dir*p.spd*dt;
    if(p.t > 1 || p.t < 0){ p.dir *= -1; p.t = THREE.MathUtils.clamp(p.t, 0, 1); }
    const s = p.s;
    p.m.position.set(
      s.ax + (s.bx-s.ax)*p.t + s.nx*p.side*(s.w/2+1.2), 0.85,
      s.az + (s.bz-s.az)*p.t + s.nz*p.side*(s.w/2+1.2));
    p.m.rotation.y = Math.atan2((s.bx-s.ax)*p.dir, (s.bz-s.az)*p.dir);
  }
  /* collision drone / circulation (au ras du sol seulement) */
  if(S.flying && S.pos.y < 2.6 && S.vel.length() > 5){
    for(const v of traffic){
      const r = v.r || 2.6;
      if(Math.abs(v.pos.x-S.pos.x) < r && Math.abs(v.pos.z-S.pos.z) < r){
        damage(28, 'DRONE DÉTRUIT — CIRCULATION');
        S.vel.y = Math.max(S.vel.y, 9); S.vel.x *= -0.4; S.vel.z *= -0.4;   // éjecté vers le haut
        break;
      }
    }
  }
}

const fxHit = document.getElementById('fx-hit');
function damage(n, why){
  if(!S.flying) return;
  S.hp = Math.max(0, S.hp - n);
  S.shakeT = 0.4;
  fxHit.style.opacity = 0.9;
  setTimeout(()=>{ fxHit.style.opacity = 0; }, 140);
  if(AU.ctx){ /* impact sourd */
    const C = AU.ctx, b = C.createBuffer(1, C.sampleRate*0.12|0, C.sampleRate);
    const dd = b.getChannelData(0);
    for(let i=0;i<dd.length;i++) dd[i] = (Math.random()*2-1)*(1-i/dd.length);
    const s = C.createBufferSource(); s.buffer = b;
    const f = C.createBiquadFilter(); f.type='lowpass'; f.frequency.value = 260;
    const g = C.createGain(); g.gain.value = 0.55;
    s.connect(f); f.connect(g); g.connect(AU.master); s.start();
  }
  if(S.hp <= 0) fail(why || 'DRONE DÉTRUIT');
}

const hunters = [];
function mkHunter(x,y,z){
  const grp = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({color: 0x1a1d22});
  const a1 = new THREE.Mesh(new THREE.BoxGeometry(2.6,0.22,0.5), mat);
  const a2 = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.22,2.6), mat);
  const core = new THREE.Mesh(new THREE.SphereGeometry(0.55,10,8), new THREE.MeshLambertMaterial({color:0x2a2e36}));
  const eye = new THREE.Mesh(new THREE.SphereGeometry(0.2,8,6), new THREE.MeshBasicMaterial({color:0xff2222}));
  eye.position.set(0,-0.1,-0.5);
  grp.add(a1,a2,core,eye);
  grp.position.set(x,y,z);
  cityGrp.add(grp);
  const h = { grp, pos: grp.position, vel: new THREE.Vector3(),
    anchor: new THREE.Vector3(x,y,z), ph: rnd()*6.28, state:'patrol', fireCd: 0, eye };
  hunters.push(h);
  return h;
}
function huntersUpdate(dt){
  const d = def();
  /* renfort si l'alarme monte trop */
  if(S.alarm > 55 && !S._reinforced && searchlights.some(l=>l.detect)){
    S._reinforced = true;
    mkHunter(S.pos.x + 40, 26, S.pos.z + 40);
    photoMsg = '⚠ INTERCEPTEUR EN APPROCHE'; photoMsgT = 2.5;
  }
  for(const h of hunters){
    h.fireCd = Math.max(0, h.fireCd - dt);
    const toP = S.pos.clone().sub(h.pos);
    const dist = toP.length();
    if(h.state === 'down'){
      /* neutralisé par IEM : chute et redémarrage */
      h.downT -= dt;
      h.vel.y = Math.max(h.vel.y - 26*dt, -16);
      h.pos.addScaledVector(h.vel, dt);
      if(h.pos.y < 1.6){ h.pos.y = 1.6; h.vel.set(0,0,0); }
      h.grp.rotation.z = Math.min(h.grp.rotation.z + dt*2.4, 0.7);
      h.eye.material.color.setHex(0x333333);
      if(h.downT <= 0){ h.state = 'patrol'; h.grp.rotation.z = 0; }
      continue;
    }
    if(h.state === 'patrol'){
      h.ph += dt*0.5;
      const tx = h.anchor.x + Math.sin(h.ph)*24, tz = h.anchor.z + Math.cos(h.ph)*24;
      const tv = new THREE.Vector3(tx-h.pos.x, (h.anchor.y-h.pos.y)*0.5, tz-h.pos.z).clampLength(0, 9);
      h.vel.lerp(tv, Math.min(1, 2*dt));
      if(dist < T.huntSee*EFF.see && S.flying) h.state = 'chase';
    } else {
      const lead = S.pos.clone().addScaledVector(S.vel, 0.25);
      const tv = lead.sub(h.pos).normalize().multiplyScalar(T.maxSpd*EFF.spd*T.huntSpd);
      h.vel.lerp(tv, Math.min(1, 1.6*dt));
      if(dist > T.huntLose) h.state = 'patrol';
      /* tir */
      if(dist < T.huntFire && h.fireCd <= 0 && S.flying){
        h.fireCd = 1.25;
        tone(1500, 0.12, 'sawtooth', 0.2, 320);
        if(Math.random() < 0.62 - dist/110) damage(8, 'ABATTU PAR UN INTERCEPTEUR');
      }
      /* collision drone/drone (avec délai de grâce) */
      h.touchCd = Math.max(0, (h.touchCd||0) - dt);
      if(dist < 3 && S.flying && h.touchCd <= 0){
        h.touchCd = 1.1;
        damage(16, 'PERCUTÉ PAR UN INTERCEPTEUR');
        const kb = toP.normalize().multiplyScalar(14);
        S.vel.add(kb); h.vel.sub(kb);
      }
    }
    h.pos.addScaledVector(h.vel, dt);
    h.pos.y = Math.max(3, Math.min(80, h.pos.y));
    h.grp.rotation.y = Math.atan2(h.vel.x, h.vel.z);
    h.eye.material.color.setHex(h.state==='chase' ? 0xff2222 : 0xff8800);
  }
  /* menace sonore : bourdonnement du plus proche */
  if(AU.ctx && AU.hGain){
    let nearest = 1e9;
    for(const h of hunters) nearest = Math.min(nearest, h.pos.distanceTo(S.pos));
    const v = S.flying && nearest < 70 ? (1 - nearest/70)*0.16 : 0;
    AU.hGain.gain.value += (v - AU.hGain.gain.value)*Math.min(1, 6*dt);
    if(v > 0) AU.hOsc.frequency.value = 210 + 40*Math.sin(performance.now()/90);
  }
}

/* ================= drone : le vol suit la caméra ================= */
function lookDir(){
  return new THREE.Vector3(-Math.sin(S.yaw)*Math.cos(S.pitch), Math.sin(S.pitch), -Math.cos(S.yaw)*Math.cos(S.pitch));
}
function insideCollider(p){
  for(const c of colliders){
    if(p.x>c.min.x && p.x<c.max.x && p.y>c.min.y && p.y<c.max.y && p.z>c.min.z && p.z<c.max.z){
      if(!c.poly || pip(c.poly, p.x, p.z)) return true;   // empreinte réelle si dispo
    }
  }
  return false;
}
function respawn(def){
  if(def.type === 'chase'){
    S.pos.set(car.pos.x - Math.sin(car.heading)*30, 24, car.pos.z - Math.cos(car.heading)*30);
  } else if(def.type === 'race'){
    S.pos.copy(rings[0].pos).add(new THREE.Vector3(0, 2, 42));
  } else {
    /* décollage au bord de la zone d'opération, face à l'objectif */
    S.pos.set(OPZONE.c.x, 38, OPZONE.c.z + OPZONE.r*0.8);
  }
  while(insideCollider(S.pos)) S.pos.y += 8;
  S.vel.set(0,0,0);
  const aim = def.type === 'chase' ? car.pos
            : def.type === 'race' ? rings[0].pos
            : (photoTargets[0]?.pos || new THREE.Vector3(0,10,0));
  S.yaw = Math.atan2(-(aim.x - S.pos.x), -(aim.z - S.pos.z));
  S.pitch = -0.15;
  S.batt = 100; S.timer = def.time; S.lockT = 0; S.escapeT = 0; S.alarm = 0;
  S.hp = EFF.hpMax; S.shakeT = 0; S._reinforced = false;
  S.emp = EFF.empMax; S.empCd = 0;
  S.zoom = 1; S.zoomT = 1; S.crashed = false; S.briefT = 7;
}
function physics(dt){
  /* avant = direction du regard (3D) : pique du nez = descend, cabre = monte */
  const f = lookDir();
  const r = new THREE.Vector3(Math.cos(S.yaw), 0, -Math.sin(S.yaw));
  const dir = new THREE.Vector3();
  if(keys['KeyW']) dir.add(f);
  if(keys['KeyS']) dir.sub(f);
  if(keys['KeyD']) dir.add(r);
  if(keys['KeyA']) dir.sub(r);
  if(dir.lengthSq()>0) dir.normalize();
  S.boost = !!keys['Space'] && S.batt > 0;
  const mul = (S.boost ? T.boostMul : 1) * EFF.spd;
  const tv = dir.multiplyScalar(T.maxSpd*mul);
  tv.y += ((keys['KeyQ'] ? T.maxUp : 0) + (keys['KeyE'] ? -T.maxUp : 0)) * EFF.spd;
  const k = Math.min(1, T.accel*dt/T.maxSpd*10);
  S.vel.x += (tv.x - S.vel.x)*k;
  S.vel.y += (tv.y - S.vel.y)*Math.min(1, k*1.2);
  S.vel.z += (tv.z - S.vel.z)*k;
  S.batt = Math.max(0, S.batt - dt*(T.battDrain + (S.boost? T.battBoost*EFF.boostDrain : 0))*EFF.drain);
  S.empCd = Math.max(0, S.empCd - dt);
  const step = S.vel.length()*dt;
  const n = THREE.MathUtils.clamp(Math.ceil(step/0.4), 1, 10);
  for(let i=0;i<n;i++){
    const nx = S.pos.x + S.vel.x*dt/n, ny = S.pos.y + S.vel.y*dt/n, nz = S.pos.z + S.vel.z*dt/n;
    const ground = ny < 0.5;
    const hit = ground || insideCollider(new THREE.Vector3(nx,ny,nz));
    if(hit){
      const v = S.vel.length();
      const lim = ground ? 13 : 10;
      if(v > 27){ S.hp = 0; fail('DRONE DÉTRUIT — IMPACT'); return; }
      if(v > lim){
        damage(Math.round((v-lim)*2.4), 'DRONE DÉTRUIT — IMPACT');   // choc encaissé
        S.vel.multiplyScalar(-0.25);                                  // rebond
      } else S.vel.multiplyScalar(0.2);
      return;
    }
    S.pos.set(nx, Math.min(ny, 240), nz);
  }
}

/* ================= photo & zoom ================= */
const flash = document.getElementById('fx-flash');
let photoMsg = '', photoMsgT = 0;
let shots = [];   // clichés de la mission {url, label}
let beepT = 0;
function snapFrame(label){
  /* capture réelle de l'image rendue (rendu synchrone puis copie réduite) */
  renderer.render(scene, cam);
  const c = document.createElement('canvas'); c.width = 300; c.height = 168;
  c.getContext('2d').drawImage(renderer.domElement, 0, 0, c.width, c.height);
  shots.push({url: c.toDataURL('image/jpeg', 0.72), label});
}
function takePhoto(){
  if(S.photoCd > 0 || !S.flying) return;
  S.photoCd = T.photoCd;
  sfxShutter();
  flash.style.opacity = 0.75;
  setTimeout(()=>{ flash.style.opacity = 0; }, 90);
  const ld = lookDir();
  let got = null, why = '';
  for(const t of photoTargets){
    if(t.done) continue;
    const to = t.pos.clone().sub(S.pos);
    const dist = to.length();
    const ang = ld.angleTo(to.normalize());
    if(ang < T.photoAngle && dist < t.range){
      if(t.needZoom && S.zoom < 1.6){ why = 'TROP LOIN — UTILISE LE ZOOM ×2'; continue; }
      t.done = true; got = t; break;
    } else if(ang < 0.35 && dist < t.range*2.2){
      why = dist >= t.range ? 'TROP LOIN — RAPPROCHE-TOI' : 'CADRE LA CIBLE';
    }
  }
  if(got){
    snapFrame(got.label);
    photoMsg = `📷 ${got.label} — CLICHÉ VALIDÉ`; photoMsgT = 3;
    S.score += 400;
    tone(1200, 0.18, 'sine', 0.25, 1600);
    if(photoTargets.every(t=>t.done)) setTimeout(win, 650);
  } else { photoMsg = why || 'CLICHÉ SANS INTÉRÊT'; photoMsgT = 1.6; }
}

/* ================= mission ================= */
function def(){ return DEFS[cur]; }
function missionUpdate(dt){
  const d = def();
  S.timer -= dt;
  S.photoCd = Math.max(0, S.photoCd - dt);
  if(photoMsgT > 0) photoMsgT -= dt;
  if(S.briefT > 0) S.briefT -= dt;

  for(const L of searchlights){
    L.offT = Math.max(0, (L.offT||0) - dt);
    if(L.offT > 0){ L.spot.visible = false; continue; }   // grillé par l'IEM
    L.spot.visible = true;
    L.ph += dt*L.spd;
    const tx = L.x + Math.sin(L.ph)*L.r, tz = L.z + Math.cos(L.ph*0.83)*L.r;
    L.tgt.position.set(tx, 0, tz);
    if(L.detect && S.flying){
      const src = new THREE.Vector3(L.x, L.h, L.z);
      const dirL = new THREE.Vector3(tx,0,tz).sub(src).normalize();
      const toD = S.pos.clone().sub(src);
      if(toD.length() < 120 && dirL.angleTo(toD.normalize()) < 0.34){
        S.alarm = Math.min(100, S.alarm + dt*T.alarmRise*(d.hard?2:1)*EFF.alarm);
      }
    }
  }
  if(searchlights.some(l=>l.detect)) S.alarm = Math.max(0, S.alarm - dt*T.alarmDecay*0.4);
  if(S.alarm >= 100){ fail('REPÉRÉ PAR LA SÉCURITÉ'); return; }

  if(d.type === 'chase'){
    const toCar = car.pos.clone().sub(S.pos);
    const dist = toCar.length();
    const ang = lookDir().angleTo(toCar.normalize());
    const locking = dist < T.lockDist && ang < T.lockAngle;
    const need = d.need + (d.endless ? endlessLvl*0.5 : 0);
    const escD = d.escape || 170;
    if(locking){
      S.lockT = Math.min(need, S.lockT + dt);
      beepT -= dt;
      if(beepT <= 0){ tone(760 + 520*(S.lockT/need), 0.06, 'square', 0.14); beepT = 0.42 - 0.3*(S.lockT/need); }
    }
    else S.lockT = Math.max(0, S.lockT - dt*0.8);
    S.escapeT = dist > escD ? S.escapeT + dt : 0;
    S._dist = dist; S._locking = locking; S._need = need; S._escD = escD;
    if(S.lockT >= need){
      if(d.endless){
        endlessLvl++; S.score += 800 + endlessLvl*200;
        snapFrame(`CIBLE ${endlessLvl}`); sfxRing();
        photoMsg = `CIBLE ${endlessLvl} IDENTIFIÉE — SUIVANTE ${(25+endlessLvl*2)*3.6|0} KM/H`; photoMsgT = 3;
        carReset(25 + endlessLvl*2); S.lockT = 0; S.timer = Math.min(d.time, S.timer + 35);
        if(endlessLvl % 2 === 0){ mkHunter(S.pos.x - 60, 24, S.pos.z - 60);
          photoMsg += ' · RENFORT HOSTILE'; }
      } else { snapFrame('IDENTIFICATION'); win(); return; }
    }
    if(S.escapeT > T.escapeTime){ fail('CIBLE PERDUE'); return; }
  }
  if(d.type === 'race'){
    const r = rings[ringIdx];
    if(r){
      r.mesh.rotation.y += dt*1.5;
      const dd = S.pos.distanceTo(r.pos);
      S._dist = dd;
      if(dd < 5.5){
        r.mesh.material.color.setHex(0x33505c);
        ringIdx++;
        S.score += 150;
        sfxRing();
        photoMsg = `BALISE ${ringIdx}/${rings.length}`; photoMsgT = 1.4;
        if(ringIdx >= rings.length){ win(); return; }
      }
    }
  }
  /* périmètre d'opération : dehors = brouillage */
  if(!inZone(S.pos.x, S.pos.z)){
    S.outT = (S.outT||0) + dt;
    if(S.outT > 6){ fail('HORS ZONE — LIAISON PERDUE'); return; }
  } else S.outT = 0;

  if(S.timer <= 0){ fail(d.type==='race' ? 'CHRONO ÉCOULÉ' : 'TEMPS ÉCOULÉ'); return; }
  if(S.batt <= 0){
    S.vel.y = Math.min(S.vel.y, -6);
    if(S.pos.y < 2){ fail('BATTERIE À PLAT'); return; }
  }
}

function marker(g, pos, label, color, w, h, cx, cy, distShow){
  const v = pos.clone(); v.y += 1.2;
  const pr = v.project(cam);
  const sx = (pr.x*0.5+0.5)*w, sy = (-pr.y*0.5+0.5)*h;
  const dist = pos.distanceTo(S.pos);
  const onScr = pr.z < 1 && sx > 0 && sx < w && sy > 0 && sy < h;
  if(onScr){
    const r = THREE.MathUtils.clamp(1400/Math.max(dist,6), 16, 64);
    g.strokeStyle = color; g.lineWidth = 2;
    g.strokeRect(sx-r, sy-r, r*2, r*2);
    g.fillStyle = color; g.textAlign = 'center'; g.font = '12px "Courier New",monospace';
    g.fillText(distShow ? `${label} · ${dist.toFixed(0)} m` : label, sx, sy + r + 16);
    return {sx, sy, r, dist, onScr};
  } else {
    const a = Math.atan2(sy-cy, sx-cx);
    const bx = cx + Math.cos(a)*(Math.min(w,h)*0.42), by = cy + Math.sin(a)*(Math.min(w,h)*0.42);
    g.save(); g.translate(bx,by); g.rotate(a);
    g.fillStyle = color;
    g.beginPath(); g.moveTo(14,0); g.lineTo(-8,-9); g.lineTo(-8,9); g.closePath(); g.fill();
    g.restore();
    g.fillStyle = color; g.textAlign = 'center'; g.font = '12px "Courier New",monospace';
    g.fillText(`${dist.toFixed(0)} m`, bx, by + 22);
    return {dist, onScr};
  }
}
function drawHUD(){
  const w = hud.width, h = hud.height, g = hctx;
  g.clearRect(0,0,w,h);
  if(!S.flying) return;
  const d = def();
  const CYN = '#8fd8ff', DIM = 'rgba(143,216,255,.6)', RED = '#ff7a6e', AMB = '#ffd27a';
  const cx = w/2, cy = h/2;
  g.textBaseline = 'middle';
  g.shadowColor = 'rgba(0,10,20,.85)'; g.shadowBlur = 4;   // lisible en plein jour

  g.strokeStyle = CYN; g.lineWidth = 1.2;
  g.beginPath();
  g.moveTo(cx-16,cy); g.lineTo(cx-5,cy); g.moveTo(cx+5,cy); g.lineTo(cx+16,cy);
  g.moveTo(cx,cy-14); g.lineTo(cx,cy-5); g.moveTo(cx,cy+5); g.lineTo(cx,cy+14);
  g.stroke();
  if(S.zoom > 1.05){
    g.strokeStyle = DIM;
    g.strokeRect(cx-w*0.24, cy-h*0.24, w*0.48, h*0.48);
    g.fillStyle = AMB; g.font = '13px "Courier New",monospace'; g.textAlign = 'left';
    g.fillText(`ZOOM ×${S.zoom.toFixed(1)}`, cx + w*0.24 + 10, cy - h*0.24);
  }
  g.strokeStyle = CYN; g.fillStyle = CYN;
  const spd = Math.round(S.vel.length()*3.6);
  g.font = 'bold 26px "Courier New",monospace'; g.textAlign = 'center';
  g.strokeRect(cx-260-52, cy-18, 104, 36); g.fillText(spd, cx-260, cy);
  g.strokeRect(cx+260-52, cy-18, 104, 36); g.fillText(S.pos.y.toFixed(0), cx+260, cy);
  g.font = '11px "Courier New",monospace'; g.fillStyle = DIM;
  g.fillText('KM/H', cx-260, cy-28); g.fillText('ALT M', cx+260, cy-28);

  g.textAlign = 'left'; g.fillStyle = CYN; g.font = '13px "Courier New",monospace';
  g.fillText(`OP. ${String(cur+1).padStart(2,'0')} — ${d.title}`, 24, 26);
  g.fillStyle = DIM;
  let objLine = '';
  if(d.type==='chase') objLine = d.endless ? `CIBLES IDENTIFIÉES : ${endlessLvl}` : `VERROUILLE LA CIBLE ${(S._need||d.need).toFixed(0)} s`;
  if(d.type==='photo' || d.type==='infil') objLine = `PHOTOS ${photoTargets.filter(t=>t.done).length}/${photoTargets.length}`;
  if(d.type==='race') objLine = `BALISES ${ringIdx}/${rings.length}`;
  g.fillText(objLine, 24, 46);
  if(S.briefT > 0){ g.fillStyle = AMB; g.fillText('► ' + d.obj, 24, 68); }

  g.textAlign = 'right';
  g.fillStyle = S.timer < 15 ? RED : CYN;
  g.font = 'bold 17px "Courier New",monospace';
  g.fillText(`T-${Math.max(0,S.timer).toFixed(0).padStart(3,'0')}`, w-24, 28);
  g.font = '13px "Courier New",monospace'; g.fillStyle = CYN;
  g.fillText(`SCORE ${S.score}`, w-24, 50);
  g.fillText(`RECORD ${S.best}`, w-24, 68);

  g.textAlign = 'left';
  g.fillStyle = S.batt < 25 ? RED : CYN;
  g.font = '13px "Courier New",monospace';
  g.fillText(`BAT ${S.batt.toFixed(0)}%`, 24, h-40);
  g.strokeStyle = g.fillStyle; g.strokeRect(24, h-30, 120, 10);
  g.fillRect(26, h-28, 116*(S.batt/100), 6);
  if(S.boost){ g.fillStyle = AMB; g.fillText('BOOST', 160, h-40); }
  /* intégrité */
  g.fillStyle = S.hp < 35 ? RED : CYN;
  g.fillText(`INT ${S.hp.toFixed(0)}/${EFF.hpMax}`, 24, h-70);
  g.strokeStyle = g.fillStyle; g.strokeRect(24, h-60, 120, 10);
  g.fillRect(26, h-58, 116*(S.hp/EFF.hpMax), 6);
  /* charges IEM */
  g.fillStyle = S.empCd > 0 ? DIM : '#9fe8ff';
  g.font = '14px "Courier New",monospace';
  g.fillText(`IEM [F] ${'◆'.repeat(S.emp)}${'◇'.repeat(Math.max(0, EFF.empMax - S.emp))}`, 24, h-96);
  /* glitchs quand le drone est amoché */
  if(S.hp < 40 && Math.random() < 0.3){
    g.fillStyle = 'rgba(255,60,40,.10)';
    for(let k=0;k<3;k++){
      const gy = Math.random()*h;
      g.fillRect(0, gy, w, 2 + Math.random()*9);
    }
  }
  /* intercepteurs hostiles */
  for(const hh of hunters){
    if(hh.state !== 'chase') continue;
    marker(g, hh.pos, 'HOSTILE', RED, w, h, cx, cy, true);
  }

  if(searchlights.some(l=>l.detect)){
    g.textAlign = 'right';
    g.fillStyle = S.alarm > 55 ? RED : DIM;
    g.fillText(`ALERTE ${S.alarm.toFixed(0)}%`, w-24, h-40);
    g.strokeStyle = g.fillStyle; g.strokeRect(w-144, h-30, 120, 10);
    g.fillRect(w-142, h-28, 116*(S.alarm/100), 6);
    if(S.alarm > 55){
      g.fillStyle = `rgba(255,60,40,${0.08 + 0.08*Math.sin(performance.now()/120)})`;
      g.fillRect(0,0,w,h);
    }
  }

  if(d.type === 'chase'){
    const need = S._need || d.need;
    const mk = marker(g, car.pos, 'CIBLE', S._locking ? AMB : (S._dist > (S._escD||170) ? RED : CYN), w, h, cx, cy, true);
    if(mk.onScr){
      g.beginPath();
      g.arc(mk.sx, mk.sy, mk.r+10, -Math.PI/2, -Math.PI/2 + 2*Math.PI*(S.lockT/need));
      g.strokeStyle = AMB; g.lineWidth = 3.5; g.stroke();
      if(S._locking){
        g.fillStyle = AMB; g.textAlign='center'; g.font='bold 14px "Courier New",monospace';
        g.fillText(`SCAN ${(S.lockT/need*100).toFixed(0)}%`, mk.sx, mk.sy - mk.r - 16);
      }
    }
    if(S.escapeT > 0){
      g.fillStyle = RED; g.textAlign='center'; g.font='bold 17px "Courier New",monospace';
      g.fillText(`⚠ SIGNAL FAIBLE — ELLE TE SÈME ${(T.escapeTime-S.escapeT).toFixed(1)} s`, cx, cy-120);
    }
  }
  if(d.type === 'photo' || d.type === 'infil'){
    for(const t of photoTargets)
      if(!t.done) marker(g, t.pos, t.label + (t.needZoom? ' [ZOOM]':''), CYN, w, h, cx, cy, true);
  }
  if(d.type === 'race' && rings[ringIdx])
    marker(g, rings[ringIdx].pos, `BALISE ${ringIdx+1}`, '#27e8ff', w, h, cx, cy, true);

  /* sortie de zone : avertissement + brouillage croissant */
  const zd = Math.hypot(S.pos.x-OPZONE.c.x, S.pos.z-OPZONE.c.z);
  if(zd > OPZONE.r){
    g.fillStyle = RED; g.textAlign = 'center'; g.font = 'bold 18px "Courier New",monospace';
    g.fillText(`⚠ HORS ZONE — LIAISON PERDUE DANS ${Math.max(0, 6-(S.outT||0)).toFixed(1)} s`, cx, cy - 170);
    g.fillStyle = `rgba(120,180,220,${Math.min(0.5, (S.outT||0)*0.09)})`;
    for(let k=0;k<26;k++) g.fillRect(Math.random()*w, Math.random()*h, 60+Math.random()*160, 1.5);
  } else if(zd > OPZONE.r - 45){
    g.fillStyle = AMB; g.textAlign = 'center'; g.font = '13px "Courier New",monospace';
    g.fillText(`LIMITE DE ZONE ${(OPZONE.r-zd).toFixed(0)} m`, cx, cy - 170);
  }
  if(photoMsgT > 0){
    g.fillStyle = photoMsg.includes('VALIDÉ') || photoMsg.includes('IDENTIFIÉE') || photoMsg.includes('BALISE') ? AMB : RED;
    g.textAlign = 'center'; g.font = 'bold 16px "Courier New",monospace';
    g.fillText(photoMsg, cx, h - 110);
  }
  if(S.batt <= 0){
    g.fillStyle = RED; g.textAlign='center'; g.font='bold 17px "Courier New",monospace';
    g.fillText('⚠ BATTERIE VIDE — MOTEURS COUPÉS', cx, cy-148);
  }
  g.shadowBlur = 0;
}

/* ================= boucle ================= */
const clock = new THREE.Clock();
function loop(){
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = performance.now()/1000;
  for(const b of blinkers) b.mat.visible = Math.sin(t*3.4 + b.ph) > 0;
  if(S.flying && !S.crashed){
    physics(dt);
    if(S.flying){
      if(def().type === 'chase') carUpdate(dt);
      lifeUpdate(dt);
      if(S.flying) huntersUpdate(dt);
      if(S.flying) missionUpdate(dt);
    }
  }
  updateAudio(dt);
  if(S.shakeT > 0) S.shakeT -= dt;
  for(let i=empFx.length-1;i>=0;i--){
    const f = empFx[i];
    f.t += dt;
    f.m.scale.setScalar(1 + f.t*52);
    f.m.material.opacity = 0.55*(1 - f.t/0.8);
    if(f.t > 0.8){ cityGrp.remove(f.m); empFx.splice(i,1); }
  }
  S.zoom += (S.zoomT - S.zoom)*Math.min(1, 10*dt);
  cam.fov = 78 / S.zoom; cam.updateProjectionMatrix();
  cam.position.copy(S.pos);
  cam.rotation.set(0,0,0);
  cam.rotateY(S.yaw); cam.rotateX(S.pitch);
  const bank = THREE.MathUtils.clamp(-S.vel.dot(new THREE.Vector3(Math.cos(S.yaw),0,-Math.sin(S.yaw)))*0.006, -0.18, 0.18);
  cam.rotateZ(bank);
  if(S.shakeT > 0){   // secousse d'impact
    const k = S.shakeT*0.05;
    cam.rotateX((Math.random()-0.5)*k); cam.rotateZ((Math.random()-0.5)*k);
  }
  renderer.render(scene, cam);
  drawHUD();
}
loop();

/* ================= hooks de test ================= */
window.__chase = { state: S, keys, T, car, graph, PARIS, EFF, DRONES, MODS,
  get colliders(){ return colliders; },
  get photoTargets(){ return photoTargets; },
  get rings(){ return rings; }, get ringIdx(){ return ringIdx; },
  get searchlights(){ return searchlights; }, get tod(){ return tod; },
  get traffic(){ return traffic; }, get peds(){ return peds; },
  get hunters(){ return hunters; }, mkHunter, damage,
  get shots(){ return shots; }, get credits(){ return credits; },
  get shopState(){ return shopState; }, get stars(){ return stars; },
  addCredits: n => { credits += n; saveShop(); },
  DEFS, get cur(){ return cur; }, get prog(){ return prog; },
  brief, launch, launchMission: i => { cur = i; launch(); },
  takePhoto, respawn, fail, win, applyTod, renderShop,
  setLook: (y,p) => { S.yaw = y; S.pitch = p; },
  setZoom: z => { S.zoomT = z; S.zoom = z; },
  cam, scene, THREE };
</script>
